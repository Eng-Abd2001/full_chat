<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محادثة WhatsApp | ستوديو المحاكاة</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* ألوان المنصة الرئيسية */
            --bg-site: #0b0f19; 
            --panel-bg: #151b2b;
            --primary-color: #25D366; /* أخضر واتساب */
            
            /* ألوان واجهة واتساب الأصلية (Dark Mode) */
            --wa-bg: #0b141a; 
            --wa-header: #202c33;
            --wa-sent: #005c4b;
            --wa-received: #202c33;
            --wa-text: #e9edef;
            --wa-muted: #8696a0;
            --wa-blue-tick: #53bdeb;
            --wa-date-bg: #182229;
            
            --font-ar: 'Tajawal', sans-serif;
            --font-en: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-site);
            color: #fff;
            font-family: var(--font-ar);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 15px;
            -webkit-font-smoothing: antialiased;
        }

        .top-nav {
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .back-btn {
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            font-weight: 500;
            transition: 0.3s;
        }
        
        .back-btn:hover { color: var(--primary-color); }

        .workspace {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            width: 100%;
            max-width: 1000px;
            justify-content: center;
        }

        /* لوحة التحكم */
        .controls {
            background: var(--panel-bg);
            border: 1px solid #1e293b;
            padding: 25px;
            border-radius: 16px;
            flex: 1;
            min-width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .controls h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 13px; color: #cbd5e1; }
        .input-group input, .input-group textarea, .input-group select {
            width: 100%; padding: 12px; background: #0f172a; border: 1px solid #1e293b;
            color: #fff; border-radius: 10px; outline: none; font-size: 14px;
            font-family: var(--font-ar); transition: 0.3s;
        }
        .input-group input:focus, .input-group textarea:focus { border-color: var(--primary-color); }
        .input-group textarea { resize: vertical; min-height: 60px; }

        .custom-file-upload {
            display: block; width: 100%; padding: 12px; background: #0f172a;
            border: 1px dashed var(--primary-color); color: var(--primary-color);
            border-radius: 10px; text-align: center; cursor: pointer; font-size: 14px;
            transition: 0.3s;
        }
        .custom-file-upload:hover { background: rgba(37, 211, 102, 0.1); }

        .btn-download {
            width: 100%; background: var(--primary-color); color: #000; font-weight: bold;
            padding: 15px; font-size: 16px; border: none; border-radius: 30px;
            cursor: pointer; transition: 0.3s; margin-top: 10px; font-family: var(--font-ar);
        }
        .btn-download:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3); }

        /* منطقة التصوير (الموبايل) */
        .capture-container {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 9 / 16;
            background-color: var(--wa-bg);
            border: 1px solid #222;
            border-radius: 35px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            /* خلفية واتساب الأصلية (خفيفة جداً) */
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M54.627 0l.83.83v58.34l-.83.83H5.373l-.83-.83V.83l.83-.83h49.254zM26.5 13.5v-2h-3v2h3zm10 0v-2h-3v2h3zm-5 10v-2h-3v2h3zm10 0v-2h-3v2h3zm-15 10v-2h-3v2h3zm10 0v-2h-3v2h3zm-5 10v-2h-3v2h3zm10 0v-2h-3v2h3z' fill='%23ffffff' fill-opacity='0.02' fill-rule='evenodd'/%3E%3C/svg%3E");
        }

        /* هيدر واتساب */
        .wa-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 15px;
            background: var(--wa-header);
            z-index: 10;
        }

        .wa-header-left {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .wa-back { color: var(--wa-text); font-size: 18px; display: flex; align-items: center; gap: 5px; cursor: pointer; }
        
        .wa-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background-color: #333; background-size: cover; background-position: center;
        }

        .wa-user-info { display: flex; flex-direction: column; }
        .wa-name { color: var(--wa-text); font-size: 16px; font-weight: 600; line-height: 1.2; font-family: var(--font-en); }
        .wa-status { color: var(--wa-muted); font-size: 13px; line-height: 1.2; }

        .wa-header-icons {
            display: flex;
            gap: 20px;
            color: var(--wa-text);
            font-size: 18px;
        }

        /* منطقة المحادثة */
        .wa-chat-area {
            flex: 1;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow: hidden;
        }

        .wa-date-badge {
            align-self: center;
            background: var(--wa-date-bg);
            color: var(--wa-muted);
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        /* فقاعة المستلم (الطرف الآخر) */
        .msg-received {
            align-self: flex-start;
            background: var(--wa-received);
            color: var(--wa-text);
            padding: 8px 12px 6px 12px;
            border-radius: 12px;
            border-top-right-radius: 0;
            max-width: 85%;
            font-size: 15px;
            line-height: 1.4;
            position: relative;
            box-shadow: 0 1px 1px rgba(0,0,0,0.1);
        }

        /* فقاعة المرسل (أنت) */
        .msg-sent {
            align-self: flex-end;
            background: var(--wa-sent);
            color: var(--wa-text);
            padding: 8px 12px 6px 12px;
            border-radius: 12px;
            border-top-left-radius: 0;
            max-width: 85%;
            font-size: 15px;
            line-height: 1.4;
            position: relative;
            box-shadow: 0 1px 1px rgba(0,0,0,0.1);
        }

        /* الوقت وتفاصيل الرسالة */
        .msg-meta {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 4px;
            margin-top: 4px;
            font-size: 11px;
            color: rgba(255,255,255,0.6);
            float: left; /* لدفع الوقت لليسار أسفل النص في اللغة العربية */
            margin-right: 15px;
            font-family: var(--font-en);
        }

        .msg-received .msg-meta { float: left; margin-right: 15px; }

        /* الصح الأزرق المقفول هندسياً */
        .blue-ticks {
            color: var(--wa-blue-tick);
            font-size: 13px;
            display: flex;
            align-items: center;
        }

        /* شريط الإدخال السفلي */
        .wa-input-area {
            padding: 10px;
            background: var(--wa-bg);
            display: flex;
            align-items: flex-end;
            gap: 10px;
        }

        .wa-input-box {
            flex: 1;
            background: var(--wa-header);
            border-radius: 24px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .wa-input-box i { color: var(--wa-muted); font-size: 20px; }
        
        .wa-placeholder {
            flex: 1;
            color: var(--wa-muted);
            font-size: 16px;
        }

        .wa-mic-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--primary-color);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

    </style>
</head>
<body>

    <div class="top-nav">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-right"></i> العودة للرئيسية</a>
    </div>

    <div class="workspace">
        
        <div class="controls">
            <h2><i class="fa-brands fa-whatsapp"></i> إعدادات محادثة الواتساب</h2>
            
            <div class="input-group">
                <label>صورة جهة الاتصال:</label>
                <label class="custom-file-upload">
                    <input type="file" accept="image/*" onchange="updateAvatar(event)" style="display:none;">
                    <i class="fas fa-image"></i> رفع صورة
                </label>
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div class="input-group">
                    <label>اسم الشخص:</label>
                    <input type="text" id="inName" value="Yousef" oninput="updateLive()">
                </div>
                <div class="input-group">
                    <label>الحالة (متصل، يكتب...):</label>
                    <input type="text" id="inStatus" value="متصل الآن" oninput="updateLive()">
                </div>
            </div>

            <div class="input-group">
                <label>رسالة المستلم (الرمادية):</label>
                <textarea id="inMsg1" oninput="updateLive()">السلام عليكم، هل أكملت برمجة منصة ستوديو المحاكاة؟</textarea>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:5px;">
                    <input type="text" id="inTime1" value="10:30 ص" oninput="updateLive()" dir="ltr">
                </div>
            </div>

            <div class="input-group">
                <label>رسالتك (الخضراء):</label>
                <textarea id="inMsg2" oninput="updateLive()">وعليكم السلام! نعم، تم إنجاز أداة الواتساب بنجاح وبدقة 4K خرافية.</textarea>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:5px;">
                    <input type="text" id="inTime2" value="10:32 ص" oninput="updateLive()" dir="ltr">
                    <select id="inTicks" onchange="updateLive()">
                        <option value="blue">تمت القراءة (صح أزرق)</option>
                        <option value="gray">تم الاستلام (صح رمادي)</option>
                        <option value="single">تم الإرسال (صح واحد)</option>
                    </select>
                </div>
            </div>

            <button class="btn-download" onclick="captureWhatsApp()"><i class="fas fa-camera"></i> حفظ الصورة بدقة 4K</button>
        </div>

        <div class="capture-container" id="captureArea">
            
            <div class="wa-header">
                <div class="wa-header-left">
                    <div class="wa-back"><i class="fas fa-arrow-right"></i></div>
                    <div class="wa-avatar" id="outAvatar"></div>
                    <div class="wa-user-info">
                        <span class="wa-name" id="outName">Yousef</span>
                        <span class="wa-status" id="outStatus">متصل الآن</span>
                    </div>
                </div>
                <div class="wa-header-icons">
                    <i class="fas fa-video"></i>
                    <i class="fas fa-phone-alt"></i>
                    <i class="fas fa-ellipsis-v"></i>
                </div>
            </div>

            <div class="wa-chat-area">
                
                <div class="wa-date-badge">اليوم</div>

                <div class="msg-received">
                    <span id="outMsg1">السلام عليكم، هل أكملت برمجة منصة ستوديو المحاكاة؟</span>
                    <div class="msg-meta">
                        <span id="outTime1">10:30 ص</span>
                    </div>
                </div>

                <div class="msg-sent">
                    <span id="outMsg2">وعليكم السلام! نعم، تم إنجاز أداة الواتساب بنجاح وبدقة 4K خرافية.</span>
                    <div class="msg-meta">
                        <span id="outTime2">10:32 ص</span>
                        <div class="blue-ticks" id="outTicks">
                            <i class="fas fa-check-double"></i>
                        </div>
                    </div>
                </div>

            </div>

            <div class="wa-input-area">
                <div class="wa-input-box">
                    <i class="far fa-smile"></i>
                    <span class="wa-placeholder">مراسلة</span>
                    <i class="fas fa-paperclip"></i>
                    <i class="fas fa-camera"></i>
                </div>
                <div class="wa-mic-btn">
                    <i class="fas fa-microphone"></i>
                </div>
            </div>

        </div>
    </div>

    <script>
        function updateLive() {
            document.getElementById('outName').innerText = document.getElementById('inName').value || 'الاسم';
            document.getElementById('outStatus').innerText = document.getElementById('inStatus').value;
            
            document.getElementById('outMsg1').innerText = document.getElementById('inMsg1').value;
            document.getElementById('outTime1').innerText = document.getElementById('inTime1').value;
            
            document.getElementById('outMsg2').innerText = document.getElementById('inMsg2').value;
            document.getElementById('outTime2').innerText = document.getElementById('inTime2').value;

            // تحديث حالة الصح (أزرق، رمادي، مفرد)
            const tickStatus = document.getElementById('inTicks').value;
            const tickBox = document.getElementById('outTicks');
            if (tickStatus === 'blue') {
                tickBox.innerHTML = '<i class="fas fa-check-double"></i>';
                tickBox.style.color = 'var(--wa-blue-tick)';
            } else if (tickStatus === 'gray') {
                tickBox.innerHTML = '<i class="fas fa-check-double"></i>';
                tickBox.style.color = 'var(--wa-muted)';
            } else {
                tickBox.innerHTML = '<i class="fas fa-check"></i>';
                tickBox.style.color = 'var(--wa-muted)';
            }
        }

        function updateAvatar(event) {
            const reader = new FileReader();
            reader.onload = function() { 
                document.getElementById('outAvatar').style.backgroundImage = `url(${reader.result})`; 
            };
            if(event.target.files[0]) reader.readAsDataURL(event.target.files[0]);
        }

        function captureWhatsApp() {
            const captureArea = document.getElementById('captureArea');
            
            // دقة 4K الخارقة
            html2canvas(captureArea, { 
                scale: 5, 
                backgroundColor: '#0b141a', 
                useCORS: true 
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `WhatsApp_Mockup_4K_${Date.now()}.png`;
                link.href = canvas.toDataURL("image/png", 1.0);
                link.click();
            });
        }
        
        window.onload = updateLive;
    </script>
</body>
</html>
