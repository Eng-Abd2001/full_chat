<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محادثة WhatsApp | سكرين شوت ديناميكي 4K</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-site: #0f172a; 
            --panel-bg: #1e293b;
            --primary-color: #25D366; 
            
            --wa-bg: #0b141a; 
            --wa-header: #202c33;
            --wa-sent: #005c4b;
            --wa-received: #202c33;
            --wa-text: #e9edef;
            --wa-muted: #8696a0;
            --wa-blue-tick: #53bdeb;
            --wa-date-bg: #182229;
            
            --font-ar: 'Tajawal', sans-serif;
            --font-en: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { background-color: var(--bg-site); color: #fff; font-family: var(--font-ar); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 30px 15px; -webkit-font-smoothing: antialiased;}

        .workspace { display: flex; flex-wrap: wrap; gap: 30px; width: 100%; max-width: 1050px; justify-content: center; align-items: flex-start; }

        /* ----- لوحة التحكم ----- */
        .controls { background: var(--panel-bg); border: 1px solid #334155; padding: 25px; border-radius: 16px; flex: 1; min-width: 360px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .controls h2 { font-size: 18px; margin-bottom: 20px; color: var(--primary-color); display: flex; align-items: center; gap: 10px; }
        
        .control-section { background: #0f172a; padding: 15px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 20px; }
        .control-section-title { font-size: 14px; color: var(--primary-color); margin-bottom: 15px; font-weight: 700; border-bottom: 1px solid #334155; padding-bottom: 8px; }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 13px; color: #cbd5e1; }
        .input-group input, .input-group textarea, .input-group select { width: 100%; padding: 12px; background: #1e293b; border: 1px solid #334155; color: #fff; border-radius: 10px; outline: none; font-size: 14px; font-family: var(--font-ar); }
        .input-group textarea { resize: vertical; min-height: 60px; }
        
        .file-upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .custom-file-upload { display: block; width: 100%; padding: 12px; background: #1e293b; border: 1px dashed var(--primary-color); color: var(--primary-color); border-radius: 10px; text-align: center; cursor: pointer; font-size: 13px; transition: 0.3s; }
        
        /* زر التحميل المأخوذ من ملفك */
        .btn-download { width: 100%; background: #fff; color: #000; font-weight: bold; padding: 15px; font-size: 16px; border: none; border-radius: 30px; cursor: pointer; transition: 0.2s; font-family: var(--font-ar); margin-top: 10px; display: flex; justify-content: center; align-items: center; gap: 8px;}

        /* أزرار الإضافة */
        .btn-add-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-add { flex: 1; padding: 12px; font-size: 14px; font-family: var(--font-ar); font-weight: bold; border-radius: 10px; cursor: pointer; border: none; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-add.received { background: #334155; color: #fff; }
        .btn-add.sent { background: #005c4b; color: #fff; }

        /* قائمة الرسائل المضافة */
        .msg-list-item { background: #1e293b; border: 1px solid #334155; padding: 10px; border-radius: 8px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
        .msg-list-item .msg-text-preview { flex: 1; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #e2e8f0; }
        .msg-list-item .msg-type-badge { font-size: 10px; padding: 3px 6px; border-radius: 4px; color: #fff; }
        .badge-sent { background: #005c4b; }
        .badge-received { background: #334155; }
        .action-btn { background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 14px; padding: 5px; }

        /* ----- منطقة السكرين شوت (الخام) ----- */
        .capture-container { width: 380px; aspect-ratio: 9 / 19; background-color: var(--wa-bg); border-radius: 8px; overflow: hidden; position: relative; display: flex; flex-direction: column; border: 1px solid #222; }

        /* الحل الجذري للخلفية: طبقات منفصلة بدل الدمج المعقد */
        .wa-bg-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; z-index: 1; }
        .wa-bg-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(11, 20, 26, 0.4); z-index: 2; }

        /* رفع كل المحتوى فوق الخلفية */
        .content-layer { position: relative; z-index: 10; display: flex; flex-direction: column; height: 100%; width: 100%; }

        .phone-status-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 18px 4px 18px; background: var(--wa-header); font-family: var(--font-en); font-size: 13px; color: #ffffff; font-weight: 500; }
        .status-icons { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #fff; }

        .wa-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 15px 12px 10px; background: var(--wa-header); }
        .wa-header-left { display: flex; align-items: center; gap: 8px; }
        .wa-back { color: var(--wa-text); font-size: 18px; display: flex; align-items: center; gap: 4px; }
        .wa-avatar { width: 40px; height: 40px; border-radius: 50%; background-color: #333; background-size: cover; background-position: center; }
        .wa-user-info { display: flex; flex-direction: column; justify-content: center; }
        .wa-name { color: var(--wa-text); font-size: 16px; font-weight: 500; line-height: 1.2; font-family: var(--font-en); }
        .wa-status { color: var(--wa-muted); font-size: 13px; line-height: 1.2; }
        .wa-header-icons { display: flex; gap: 20px; color: var(--wa-text); font-size: 18px; }

        .wa-chat-area { flex: 1; padding: 20px 15px; display: flex; flex-direction: column; gap: 12px; overflow: hidden; /* تم تعطيل السكرول التلقائي برمجياً لمنع التجميد */ }
        .wa-date-badge { align-self: center; background: var(--wa-date-bg); color: var(--wa-muted); font-size: 12px; padding: 6px 12px; border-radius: 8px; margin-bottom: 10px; }
        
        .msg-received, .msg-sent { padding: 8px 10px 6px 10px; border-radius: 12px; max-width: 85%; font-size: 15px; line-height: 1.4; position: relative; }
        .msg-received { align-self: flex-start; background: var(--wa-received); color: var(--wa-text); border-top-right-radius: 0; }
        .msg-sent { align-self: flex-end; background: var(--wa-sent); color: var(--wa-text); border-top-left-radius: 0; }
        
        .msg-meta { display: flex; justify-content: flex-end; align-items: center; gap: 4px; margin-top: 2px; font-size: 11px; color: rgba(255,255,255,0.6); float: left; margin-right: 15px; font-family: var(--font-en); }
        .msg-received .msg-meta { float: left; margin-right: 15px; }
        .blue-ticks { color: var(--wa-blue-tick); font-size: 13px; display: flex; align-items: center; }

        .wa-input-area { padding: 8px 10px; background: var(--wa-bg); display: flex; align-items: flex-end; gap: 10px; }
        .wa-input-box { flex: 1; background: var(--wa-header); border-radius: 24px; padding: 10px 15px; display: flex; align-items: center; gap: 15px; }
        .wa-input-box i { color: var(--wa-muted); font-size: 20px; }
        .wa-placeholder { flex: 1; color: var(--wa-muted); font-size: 16px; }
        .wa-mic-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--primary-color); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 18px; }

        .android-nav-bar { display: flex; justify-content: space-around; align-items: center; height: 44px; background: #000000; padding: 0 40px; }
        .nav-btn-recent { width: 14px; height: 14px; border: 2px solid #888; border-radius: 2px; }
        .nav-btn-home { width: 16px; height: 16px; border: 2px solid #888; border-radius: 50%; }
        .nav-btn-back { width: 0; height: 0; border-top: 7px solid transparent; border-bottom: 7px solid transparent; border-right: 11px solid #888; }
    </style>
</head>
<body>

    <div class="workspace">
        
        <div class="controls">
            <h2>إعدادات محادثة WhatsApp</h2>
            
            <div class="control-section">
                <div class="control-section-title">شريط الإشعارات والحساب</div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div class="input-group">
                        <label>الاسم:</label>
                        <input type="text" id="inName" value="Yousef" oninput="updateStaticUI()">
                    </div>
                    <div class="input-group">
                        <label>الحالة:</label>
                        <input type="text" id="inStatus" value="متصل الآن" oninput="updateStaticUI()">
                    </div>
                </div>
                
                <div class="file-upload-grid">
                    <label class="custom-file-upload">
                        <input type="file" accept="image/*" onchange="updateAvatar(event)" style="display:none;">
                        <i class="fas fa-user-circle"></i> صورة الشخص
                    </label>
                    <label class="custom-file-upload">
                        <input type="file" accept="image/*" onchange="updateChatBg(event)" style="display:none;">
                        <i class="fas fa-image"></i> خلفية المحادثة
                    </label>
                </div>

                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div class="input-group">
                        <label>وقت الموبايل:</label>
                        <input type="text" id="inPhoneTime" value="10:50" oninput="updateStaticUI()" dir="ltr">
                    </div>
                    <div class="input-group">
                        <label>البطارية:</label>
                        <select id="inBattery" onchange="updateStaticUI()">
                            <option value="full">ممتلئ (100%)</option>
                            <option value="three-quarters">جيد (75%)</option>
                            <option value="half">نصف (50%)</option>
                            <option value="low">ضعيف (أحمر)</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <div class="control-section-title">صانع الرسائل</div>
                <div class="input-group">
                    <label>تاريخ المحادثة (الوسام بالأعلى):</label>
                    <input type="text" id="inChatDate" value="اليوم" oninput="renderMessages()">
                </div>
                <div class="input-group">
                    <textarea id="newMsgText" placeholder="اكتب نص الرسالة هنا..."></textarea>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom: 15px;">
                    <div class="input-group" style="margin-bottom: 0;">
                        <label>وقت الرسالة:</label>
                        <input type="text" id="newMsgTime" value="10:30 ص" dir="ltr">
                    </div>
                    <div class="input-group" style="margin-bottom: 0;">
                        <label>حالة الصح (للمرسلة):</label>
                        <select id="newMsgTicks">
                            <option value="blue">تمت القراءة (أزرق)</option>
                            <option value="gray">تم الاستلام (رمادي)</option>
                            <option value="single">تم الإرسال (صح واحد)</option>
                        </select>
                    </div>
                </div>
                <div class="btn-add-group">
                    <button class="btn-add received" onclick="addMessage('received')"><i class="fas fa-arrow-down"></i> إضافة مستلمة</button>
                    <button class="btn-add sent" onclick="addMessage('sent')"><i class="fas fa-arrow-up"></i> إضافة مرسلة</button>
                </div>
                <div id="messages-list"></div>
            </div>

            <button class="btn-download" onclick="captureWhatsApp()"><i class="fas fa-camera"></i> حفظ الصورة للواتساب</button>
        </div>

        <div class="capture-container" id="captureArea">
            <div class="wa-bg-layer" id="outBgLayer"></div>
            <div class="wa-bg-overlay"></div>

            <div class="content-layer">
                <div class="phone-status-bar">
                    <div class="status-icons">
                        <i class="fas fa-signal"></i>
                        <i class="fas fa-wifi"></i>
                        <i id="outBattery" class="fas fa-battery-three-quarters"></i>
                    </div>
                    <div id="outPhoneTime">10:50</div>
                </div>

                <div class="wa-header">
                    <div class="wa-header-left">
                        <div class="wa-back"><i class="fas fa-arrow-right"></i></div>
                        <div class="wa-avatar" id="outAvatar"></div>
                        <div class="wa-user-info">
                            <span class="wa-name" id="outName">Yousef</span>
                            <span class="wa-status" id="outStatus">متصل الآن</span>
                        </div>
                    </div>
                    <div class="wa-header-icons">
                        <i class="fas fa-video"></i>
                        <i class="fas fa-phone-alt"></i>
                        <i class="fas fa-ellipsis-v"></i>
                    </div>
                </div>

                <div class="wa-chat-area" id="outChatArea"></div>

                <div class="wa-input-area">
                    <div class="wa-input-box">
                        <i class="far fa-smile"></i>
                        <span class="wa-placeholder">مراسلة</span>
                        <i class="fas fa-paperclip"></i>
                        <i class="fas fa-camera"></i>
                    </div>
                    <div class="wa-mic-btn">
                        <i class="fas fa-microphone"></i>
                    </div>
                </div>

                <div class="android-nav-bar">
                    <div class="nav-btn-recent"></div> <div class="nav-btn-home"></div> <div class="nav-btn-back"></div>   
                </div>
            </div>
        </div>
    </div>

    <script>
        function updateStaticUI() {
            document.getElementById('outPhoneTime').innerText = document.getElementById('inPhoneTime').value;
            document.getElementById('outName').innerText = document.getElementById('inName').value || 'الاسم';
            document.getElementById('outStatus').innerText = document.getElementById('inStatus').value;

            const batteryStatus = document.getElementById('inBattery').value;
            const batIcon = document.getElementById('outBattery');
            if (batteryStatus === 'full') { batIcon.className = 'fas fa-battery-full'; batIcon.style.color = '#fff'; }
            else if (batteryStatus === 'three-quarters') { batIcon.className = 'fas fa-battery-three-quarters'; batIcon.style.color = '#fff'; }
            else if (batteryStatus === 'half') { batIcon.className = 'fas fa-battery-half'; batIcon.style.color = '#fff'; }
            else if (batteryStatus === 'low') { batIcon.className = 'fas fa-battery-quarter'; batIcon.style.color = '#ff3b30'; }
        }

        let messages = [];

        function addMessage(type) {
            const textInput = document.getElementById('newMsgText');
            const timeInput = document.getElementById('newMsgTime');
            const ticksInput = document.getElementById('newMsgTicks');
            
            const text = textInput.value.trim();
            if(!text) return; 

            messages.push({
                id: Date.now(),
                type: type,
                text: text,
                time: timeInput.value,
                ticks: ticksInput.value
            });

            textInput.value = "";
            renderMessages();
        }

        function deleteMessage(id) {
            messages = messages.filter(m => m.id !== id);
            renderMessages();
        }

        function moveMsgUp(index) {
            if (index > 0) {
                [messages[index], messages[index - 1]] = [messages[index - 1], messages[index]];
                renderMessages();
            }
        }

        function moveMsgDown(index) {
            if (index < messages.length - 1) {
                [messages[index], messages[index + 1]] = [messages[index + 1], messages[index]];
                renderMessages();
            }
        }

        function renderMessages() {
            const listArea = document.getElementById('messages-list');
            const chatArea = document.getElementById('outChatArea');
            const chatDate = document.getElementById('inChatDate').value || 'اليوم'; 
            
            listArea.innerHTML = "";
            chatArea.innerHTML = `<div class="wa-date-badge">${chatDate}</div>`;

            messages.forEach((msg, index) => {
                const badgeClass = msg.type === 'sent' ? 'badge-sent' : 'badge-received';
                const typeText = msg.type === 'sent' ? 'مرسلة' : 'مستلمة';
                
                listArea.innerHTML += `
                    <div class="msg-list-item">
                        <span class="msg-type-badge ${badgeClass}">${typeText}</span>
                        <span class="msg-text-preview">${msg.text}</span>
                        <div style="display:flex; gap:2px;">
                            <button class="action-btn" onclick="moveMsgUp(${index})"><i class="fas fa-chevron-up"></i></button>
                            <button class="action-btn" onclick="moveMsgDown(${index})"><i class="fas fa-chevron-down"></i></button>
                            <button class="action-btn delete" onclick="deleteMessage(${msg.id})"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;

                let formattedText = msg.text.replace(/\n/g, '<br>');
                
                if (msg.type === 'received') {
                    chatArea.innerHTML += `
                        <div class="msg-received">
                            <span>${formattedText}</span>
                            <div class="msg-meta"><span>${msg.time}</span></div>
                        </div>
                    `;
                } else {
                    let ticksHTML = '';
                    if (msg.ticks === 'blue') ticksHTML = '<i class="fas fa-check-double" style="color: var(--wa-blue-tick)"></i>';
                    else if (msg.ticks === 'gray') ticksHTML = '<i class="fas fa-check-double" style="color: var(--wa-muted)"></i>';
                    else ticksHTML = '<i class="fas fa-check" style="color: var(--wa-muted)"></i>';

                    chatArea.innerHTML += `
                        <div class="msg-sent">
                            <span>${formattedText}</span>
                            <div class="msg-meta">
                                <span>${msg.time}</span>
                                <div class="blue-ticks">${ticksHTML}</div>
                            </div>
                        </div>
                    `;
                }
            });
        }

        function updateAvatar(event) {
            const reader = new FileReader();
            reader.onload = function() { document.getElementById('outAvatar').style.backgroundImage = `url(${reader.result})`; };
            if(event.target.files[0]) reader.readAsDataURL(event.target.files[0]);
        }

        /* تم تطبيق الطبقة المنفصلة لضمان عدم تجمد المكتبة */
        function updateChatBg(event) {
            const reader = new FileReader();
            reader.onload = function() { 
                document.getElementById('outBgLayer').style.backgroundImage = `url(${reader.result})`;
            };
            if(event.target.files[0]) reader.readAsDataURL(event.target.files[0]);
        }

        /* * الكود السحري: نفس الكود من ملف 32.html بالحرف الواحد
         */
        function captureWhatsApp() {
            html2canvas(document.getElementById('captureArea'), { 
                scale: 5, 
                backgroundColor: '#0b141a', 
                useCORS: true 
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `WhatsApp_4K_${Date.now()}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        }
        
        window.onload = () => {
            updateStaticUI();
            
            document.getElementById('newMsgText').value = "تم أخذ الفكرة والحل من ملف X مباشرة.";
            addMessage('received');
            
            document.getElementById('newMsgTime').value = "10:32 ص";
            document.getElementById('newMsgText').value = "جرب التحميل أكثر من مرة الآن!";
            addMessage('sent');
        };
    </script>
</body>
</html>
