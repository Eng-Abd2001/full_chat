<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محادثة ChatGPT | نسخة الـ PNG الصلبة (بدون أي تشوه)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* ألوان بيئة العمل */
            --bg-site: #0b0f19; 
            --panel-bg: #151b2b;
            --primary-neon: #10a37f;
            
            /* ألوان تطبيق ChatGPT الأصلية */
            --gpt-bg: #000000; 
            --gpt-user-bg: #2f2f2f; 
            --gpt-text: #ececec; 
            --gpt-muted: #8e8e8e; 
            
            --font-ar: 'Tajawal', sans-serif;
            --font-en: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-site);
            color: #fff;
            font-family: var(--font-ar);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 15px;
            -webkit-font-smoothing: antialiased;
        }

        .workspace {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            width: 100%;
            max-width: 1000px;
            justify-content: center;
        }

        /* لوحة التحكم */
        .controls {
            background: var(--panel-bg);
            border: 1px solid #1e293b;
            padding: 25px;
            border-radius: 16px;
            flex: 1;
            min-width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .controls h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: var(--primary-neon);
        }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 13px; color: #cbd5e1; }
        .input-group select, .input-group textarea {
            width: 100%; padding: 12px; background: #0f172a; border: 1px solid #1e293b;
            color: #fff; border-radius: 10px; outline: none; font-size: 14px;
            font-family: var(--font-ar);
        }
        .input-group textarea { resize: vertical; min-height: 80px; }

        .custom-file-upload {
            display: block; width: 100%; padding: 12px; background: #0f172a;
            border: 1px dashed var(--primary-neon); color: var(--primary-neon);
            border-radius: 10px; text-align: center; cursor: pointer; font-size: 14px;
            transition: 0.3s;
        }
        .custom-file-upload:hover { background: rgba(16, 163, 127, 0.1); }

        .btn-download {
            width: 100%; background: #fff; color: #000; font-weight: bold;
            padding: 15px; font-size: 16px; border: none; border-radius: 30px;
            cursor: pointer; transition: 0.3s; margin-top: 10px; font-family: var(--font-ar);
        }

        /* شاشة الموبايل */
        .capture-container {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 9 / 16;
            background-color: var(--gpt-bg);
            border: 1px solid #222;
            border-radius: 35px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* هيدر التطبيق */
        .gpt-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 20px 10px 20px;
            background: var(--gpt-bg);
            z-index: 10;
        }

        .gpt-menu-icon { font-size: 20px; color: var(--gpt-text); cursor: pointer; }
        
        .gpt-model-selector {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: var(--font-en);
            font-weight: 600;
            font-size: 17px;
            color: var(--gpt-text);
        }
        
        .gpt-model-selector .chevron { font-size: 14px; color: var(--gpt-muted); }
        .gpt-new-chat { font-size: 20px; color: var(--gpt-text); cursor: pointer; }

        /* المحادثة */
        .gpt-chat-area {
            flex: 1;
            padding: 20px 16px;
            overflow-y: hidden;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        /* رسالة المستخدم */
        .msg-user {
            align-self: flex-end;
            background: var(--gpt-user-bg);
            padding: 10px 16px;
            border-radius: 20px;
            max-width: 85%;
            font-size: 16px;
            line-height: 1.5;
            color: var(--gpt-text);
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        /* رسالة الذكاء الاصطناعي */
        .msg-ai {
            display: flex;
            gap: 12px;
            align-self: flex-start;
            max-width: 95%;
        }

        /* الدائرة البيضاء للشعار */
        .ai-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background-color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 2px;
            background-size: cover;
            background-position: center;
            overflow: hidden;
        }
        
        /* الصورة النقطية اللي مستحيل تصير سودة أو تتشوه */
        .default-ai-icon {
            width: 17px;
            height: 17px;
            object-fit: contain;
        }

        .ai-text {
            font-size: 16px;
            line-height: 1.6;
            color: var(--gpt-text);
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        /* شريط الإدخال السفلي */
        .gpt-input-bar {
            padding: 10px 16px 20px 16px;
            background: var(--gpt-bg);
        }

        .gpt-input-wrapper {
            display: flex;
            align-items: center;
            background: var(--gpt-user-bg);
            border-radius: 24px;
            padding: 8px 12px;
            gap: 12px;
        }

        .gpt-plus-btn {
            color: var(--gpt-text);
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
        }

        .gpt-placeholder {
            flex: 1;
            color: var(--gpt-muted);
            font-size: 15px;
            font-family: var(--font-en);
        }

        .gpt-send-btn {
            width: 30px;
            height: 30px;
            background: #ffffff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .gpt-send-btn svg { width: 14px; height: 14px; stroke: #000; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

    </style>
</head>
<body>

    <div class="workspace">
        
        <div class="controls">
            <h2><i class="fas fa-sliders-h"></i> إعدادات محادثة ChatGPT</h2>
            
            <div class="input-group">
                <label>إصدار النموذج (Model):</label>
                <select id="inModel" onchange="updateLive()">
                    <option value="ChatGPT 4o">ChatGPT 4o</option>
                    <option value="ChatGPT 4">ChatGPT 4</option>
                    <option value="ChatGPT 3.5">ChatGPT 3.5</option>
                </select>
            </div>

            <div class="input-group">
                <label>صورة الذكاء الاصطناعي (اختياري للـ Custom GPT):</label>
                <label class="custom-file-upload">
                    <input type="file" accept="image/*" onchange="updateAiAvatar(event)" style="display:none;">
                    <i class="fas fa-image"></i> تغيير صورة البوت
                </label>
            </div>

            <div class="input-group">
                <label>رسالة المستخدم (أنت):</label>
                <textarea id="inUserMsg" oninput="updateLive()">هل تم حل مشكلة السواد والتشوه بشكل نهائي؟</textarea>
            </div>

            <div class="input-group">
                <label>رد الذكاء الاصطناعي (ChatGPT):</label>
                <textarea id="inAiMsg" oninput="updateLive()" style="min-height: 120px;">نعم، تم استخدام "الضربة القاضية" هندسياً. 

المتصفح الآن يقوم برسم الشعار وتحويله إلى بكسلات صلبة (PNG) بالخفاء قبل التقاط الصورة. مستحيل أن يظهر السواد أو التشوه مهما رفعت الدقة.</textarea>
            </div>

            <button class="btn-download" onclick="captureChatGPT()"><i class="fas fa-camera"></i> حفظ الصورة بدقة 4K</button>
        </div>

        <div class="capture-container" id="captureArea">
            
            <div class="gpt-header">
                <i class="fas fa-bars gpt-menu-icon"></i>
                <div class="gpt-model-selector">
                    <span id="outModel" style="font-family: var(--font-en);">ChatGPT 4o</span>
                    <i class="fas fa-chevron-right chevron"></i>
                </div>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="gpt-new-chat"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
            </div>

            <div class="gpt-chat-area">
                
                <div class="msg-user" id="outUserMsg">هل تم حل مشكلة السواد والتشوه بشكل نهائي؟</div>
                
                <div class="msg-ai">
                    <div class="ai-avatar" id="outAiAvatar">
                        <img src="" class="default-ai-icon" id="defaultAiIcon">
                    </div>
                    <div class="ai-text" id="outAiMsg">نعم، تم استخدام "الضربة القاضية" هندسياً. 

المتصفح الآن يقوم برسم الشعار وتحويله إلى بكسلات صلبة (PNG) بالخفاء قبل التقاط الصورة. مستحيل أن يظهر السواد أو التشوه مهما رفعت الدقة.</div>
                </div>

            </div>

            <div class="gpt-input-bar">
                <div class="gpt-input-wrapper">
                    <div class="gpt-plus-btn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                    </div>
                    
                    <span class="gpt-placeholder">Message</span>
                    
                    <div class="gpt-send-btn">
                        <svg viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        function updateLive() {
            document.getElementById('outModel').innerText = document.getElementById('inModel').value;
            
            const userMsg = document.getElementById('inUserMsg').value;
            document.getElementById('outUserMsg').innerText = userMsg ? userMsg : '...';
            
            const aiMsg = document.getElementById('inAiMsg').value;
            document.getElementById('outAiMsg').innerText = aiMsg ? aiMsg : '...';
        }

        // دالة تحويل الشعار إلى بكسلات صلبة (الضربة القاضية لمشكلة السواد)
        function initAILogo() {
            const svgString = `<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 24 24"><path d="M22.2819 9.8211a5.9847 5.9847 0 0 0-.5157-4.9108 6.0462 6.0462 0 0 0-6.5098-2.9A6.0651 6.0651 0 0 0 4.9807 4.1818a5.9847 5.9847 0 0 0-3.9977 2.9 6.0462 6.0462 0 0 0 .7427 7.0966 5.98 5.98 0 0 0 .511 4.9107 6.051 6.051 0 0 0 6.5146 2.9001A5.9847 5.9847 0 0 0 13.2599 24a6.0557 6.0557 0 0 0 5.7718-4.2058 5.9894 5.9894 0 0 0 3.9977-2.9001 6.0557 6.0557 0 0 0-.7475-7.073zm-9.022 12.6081a4.4755 4.4755 0 0 1-2.8764-1.0408l.1419-.0804 4.7783-2.7582a.7948.7948 0 0 0 .3927-.6813v-6.7369l2.02 1.1686a.071.071 0 0 1 .038.052v5.5826a4.504 4.504 0 0 1-4.4945 4.4944zm-9.6607-4.1254a4.4708 4.4708 0 0 1-.5346-3.0137l.142.0852 4.783 2.7582a.7712.7712 0 0 0 .7806 0l5.8428-3.3685v2.3324a.0804.0804 0 0 1-.0332.0615L9.74 19.9502a4.4992 4.4992 0 0 1-6.1408-1.6464zM2.3408 7.8956a4.485 4.485 0 0 1 2.3655-1.9728V11.6a.7664.7664 0 0 0 .3879.6765l5.8144 3.3543-2.0201 1.1685a.0757.0757 0 0 1-.071 0l-4.8303-2.7865A4.504 4.504 0 0 1 2.3408 7.8956zm16.0993 3.8558L12.5973 8.3829a.7759.7759 0 0 0-.7806 0L5.974 11.7514v-2.3324a.0804.0804 0 0 1 .0332-.0615bDQuMzUyOC0yLjUxNTJhNC40OTkyIDQuNDk5MiAwIDAgMSA2LjE0MDggMS42NDY0IDQuNDcwOCA0LjQ3MDggMCAwIDEgLjUzNDYgMy4wMTM3bC0uMTQyLS4wODUyLTQuNzgzLTIuNzU4MnpNMjEuNjU5MiAxNi4xMDQ0YTQuNDg1IDQuNDg1IDAgMCAxLTIuMzY1NSAxLjk3MjhWMTIuNGEuNzY2NC43NjY0IDAgMCAwLS4zODc5LS42NzY1TDEzLjA5MTQgOC4zNjkybDIuMDIwMS0xLjE2ODVhLjA3NTcuMDc1NyAwIDAgMSAuMDcxIDBsNC44MzAzIDIuNzg2NWE0LjUwNCA0LjUwNCAwIDAgMS0uMzUzNiA2LjExNzJ6bS02LjA5NzUtMTAuNDU3OGE0LjQ3NTUgNC40NzU1IDAgMCAxIDIuODc2NCAxLjA0MDhsLS4xNDE5LjA4MDQtNC43NzgzIDIuNzU4MmEuNzk0OC43OTQ4IDAgMCAwLS4zOTI3LjY4MTN2Ni43MzY5bC0yLjAyLTEuMTY4NmEuMDcxLjA3MSAwIDAgMS0uMDM4LS4wNTJWOS42NjA4YTQuNTA0IDQuNTA0IDAgMCAxIDQuNDk0NS00LjQ5NDR6TTEwLjc0OTEgMTQuNTQyMmwtMi44NDY1LTEuNjQ2NHYtMy4yOTI4bDIuODQ2NS0xLjY0NjQgMi44NDY1IDEuNjQ2NHYzLjI5Mjh6" fill="#000000"/></svg>`;
            
            const img = new Image();
            img.onload = function () {
                const canvas = document.createElement("canvas");
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext("2d");
                ctx.drawImage(img, 0, 0);
                
                // زرع البكسلات الصلبة بداخل الموقع
                document.getElementById("defaultAiIcon").src = canvas.toDataURL("image/png");
            };
            img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgString);
        }

        // دالة تغيير صورة البوت في حال أردت وضع صورتك
        function updateAiAvatar(event) {
            const reader = new FileReader();
            reader.onload = function() { 
                const avatarDiv = document.getElementById('outAiAvatar');
                document.getElementById('defaultAiIcon').style.display = 'none'; 
                avatarDiv.style.backgroundImage = `url(${reader.result})`; 
            };
            if(event.target.files[0]) reader.readAsDataURL(event.target.files[0]);
        }

        // دالة الالتقاط بدقة 4K
        function captureChatGPT() {
            const captureArea = document.getElementById('captureArea');
            
            html2canvas(captureArea, { 
                scale: 5, 
                backgroundColor: '#000000'
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `ChatGPT_Mockup_4K_${Date.now()}.png`;
                link.href = canvas.toDataURL("image/png", 1.0);
                link.click();
            });
        }
        
        // تشغيل كل الدوال بمجرد فتح الصفحة
        window.onload = function() {
            updateLive();
            initAILogo();
        };
    </script>
</body>
</html>
