<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محادثة ChatGPT | سكرين شوت ديناميكي 4K</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-site: #0b0f19; 
            --panel-bg: #151b2b;
            --primary-color: #10a37f; 
            
            --cg-bg: #212121; 
            --cg-header: #212121;
            --cg-user-bubble: #2f2f2f;
            --cg-text: #ececec;
            --cg-muted: #b4b4b4;
            --cg-border: #424242;
            
            --font-ar: 'Tajawal', sans-serif;
            --font-en: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { background-color: var(--bg-site); color: #fff; font-family: var(--font-ar); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 30px 15px; -webkit-font-smoothing: antialiased;}

        .workspace { display: flex; flex-wrap: wrap; gap: 30px; width: 100%; max-width: 1050px; justify-content: center; align-items: flex-start; }

        /* ----- لوحة التحكم ----- */
        .controls { background: var(--panel-bg); border: 1px solid #1e293b; padding: 25px; border-radius: 12px; flex: 1; min-width: 360px; }
        .controls h2 { font-size: 18px; margin-bottom: 20px; color: var(--primary-color); display: flex; align-items: center; gap: 10px; }
        
        .control-section { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; border: 1px solid #1e293b; margin-bottom: 20px; }
        .control-section-title { font-size: 14px; color: var(--primary-color); margin-bottom: 15px; font-weight: 700; border-bottom: 1px solid #1e293b; padding-bottom: 8px; }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 13px; color: #cbd5e1; }
        .input-group input, .input-group textarea, .input-group select { width: 100%; padding: 10px 12px; background: #0f172a; border: 1px solid #1e293b; color: #fff; border-radius: 6px; outline: none; font-size: 14px; font-family: var(--font-ar); }
        .input-group textarea { resize: vertical; min-height: 80px; }
        
        .btn-download { width: 100%; background: #fff; color: #000; font-weight: bold; padding: 15px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-top: 10px; display: flex; justify-content: center; align-items: center; gap: 8px;}
        .btn-download:hover { opacity: 0.9; }
        .btn-download:disabled { opacity: 0.8; cursor: not-allowed; background: #475569; color: #fff; }

        .btn-add-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-add { flex: 1; padding: 12px; font-size: 14px; font-family: var(--font-ar); font-weight: bold; border-radius: 6px; cursor: pointer; border: none; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-add.user { background: #334155; color: #fff; border: 1px solid #475569; }
        .btn-add.ai { background: var(--primary-color); color: #fff; }
        .btn-add:hover { opacity: 0.8; }

        .msg-list-item { background: #0f172a; border: 1px solid #1e293b; padding: 10px; border-radius: 6px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
        .msg-list-item .msg-text-preview { flex: 1; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #e2e8f0; }
        .msg-list-item .msg-type-badge { font-size: 10px; padding: 3px 6px; border-radius: 4px; color: #fff; font-weight: bold; font-family: var(--font-en); }
        .badge-user { background: #475569; }
        .badge-ai { background: var(--primary-color); }
        .action-btn { background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 14px; padding: 5px; transition: 0.2s; }
        .action-btn:hover { color: #fff; }
        .action-btn.delete:hover { color: #ef4444; }

        /* ----- منطقة التصوير (خالية من Box-Shadow ومطابقة للأصل) ----- */
        .capture-container { width: 380px; aspect-ratio: 9 / 19; background-color: var(--cg-bg); border-radius: 0; overflow: hidden; position: relative; display: flex; flex-direction: column; border: 1px solid #334155; }

        .phone-status-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 18px 4px 18px; background: var(--cg-header); font-family: var(--font-en); font-size: 13px; color: #ffffff; font-weight: 500; }
        .status-icons { display: flex; align-items: center; gap: 6px; color: #fff; }
        .status-icons i { font-size: 11px; }

        /* رأس ChatGPT */
        .cg-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 15px; background: var(--cg-header); border-bottom: 1px solid var(--cg-border); }
        .cg-header-icon { color: var(--cg-text); font-size: 20px; cursor: pointer; }
        .cg-model-selector { display: flex; align-items: center; gap: 8px; font-family: var(--font-en); font-size: 16px; font-weight: 600; color: var(--cg-text); cursor: pointer; }
        .cg-model-selector i { font-size: 12px; color: var(--cg-muted); }

        /* منطقة المحادثة */
        .cg-chat-area { flex: 1; padding: 20px 15px; display: flex; flex-direction: column; gap: 20px; overflow-y: hidden; background-color: var(--cg-bg); }
        
        /* رسالة المستخدم */
        .cg-user-row { display: flex; justify-content: flex-end; width: 100%; } 
        .cg-user-bubble { background: var(--cg-user-bubble); padding: 12px 16px; border-radius: 18px; max-width: 85%; font-size: 15px; line-height: 1.5; color: var(--cg-text); font-family: var(--font-ar); word-wrap: break-word; }

        /* رسالة الذكاء الاصطناعي (بدون الأيقونة حسب طلبك) */
        .cg-ai-row { display: flex; align-items: flex-start; width: 100%; }
        .cg-ai-content { flex: 1; color: var(--cg-text); font-size: 15px; line-height: 1.6; font-family: var(--font-ar); word-wrap: break-word; padding-top: 4px; }
        
        .cg-action-icons { display: flex; gap: 12px; color: var(--cg-muted); font-size: 14px; margin-top: 10px; }

        /* منطقة الإدخال */
        .cg-input-area { padding: 10px 15px 20px 15px; background: var(--cg-bg); display: flex; flex-direction: column; gap: 10px; }
        .cg-input-box { background: var(--cg-user-bubble); border-radius: 24px; padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .cg-input-icons-left { display: flex; gap: 15px; color: var(--cg-muted); font-size: 20px; align-items: center; }
        .cg-placeholder { flex: 1; color: var(--cg-muted); font-size: 15px; font-family: var(--font-ar); }
        .cg-send-btn { width: 32px; height: 32px; background: #fff; color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .cg-footer-text { text-align: center; color: var(--cg-muted); font-size: 11px; font-family: var(--font-en); }

        .android-nav-bar { display: flex; justify-content: space-around; align-items: center; height: 44px; background: #000000; padding: 0 40px; }
        .nav-btn-recent { width: 14px; height: 14px; border: 2px solid #888; border-radius: 2px; }
        .nav-btn-home { width: 16px; height: 16px; border: 2px solid #888; border-radius: 50%; }
        .nav-btn-back { width: 0; height: 0; border-top: 7px solid transparent; border-bottom: 7px solid transparent; border-right: 11px solid #888; }
    </style>
</head>
<body>

    <div class="workspace">
        
        <div class="controls">
            <h2><i class="fas fa-robot"></i> لوحة تحكم ChatGPT</h2>
            
            <div class="control-section">
                <div class="control-section-title">شريط الإشعارات (Status Bar)</div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div class="input-group">
                        <label>وقت الموبايل:</label>
                        <input type="text" id="inPhoneTime" value="10:50" oninput="updateStaticUI()" dir="ltr">
                    </div>
                    <div class="input-group">
                        <label>البطارية:</label>
                        <select id="inBattery" onchange="updateStaticUI()">
                            <option value="full">ممتلئ (100%)</option>
                            <option value="three-quarters">جيد (75%)</option>
                            <option value="half">نصف (50%)</option>
                            <option value="low">ضعيف (أحمر)</option>
                        </select>
                    </div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div class="input-group">
                        <label>الـ Wi-Fi:</label>
                        <select id="inWifi" onchange="updateStaticUI()">
                            <option value="3">قوي</option>
                            <option value="0">مخفي</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>الشبكة (Signal):</label>
                        <select id="inSignal" onchange="updateStaticUI()">
                            <option value="4">تغطية كاملة</option>
                            <option value="0">لا توجد خدمة</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <div class="control-section-title">إعدادات الموديل</div>
                <div class="input-group">
                    <label>اسم الموديل بالأعلى:</label>
                    <input type="text" id="inModelName" value="ChatGPT 4o" oninput="updateStaticUI()" dir="ltr">
                </div>
            </div>

            <div class="control-section">
                <div class="control-section-title">صانع الرسائل</div>
                <div class="input-group">
                    <textarea id="newMsgText" placeholder="اكتب النص هنا..."></textarea>
                </div>
                
                <div class="btn-add-group">
                    <button class="btn-add user" onclick="addMessage('user')"><i class="fas fa-user"></i> رسالة مستخدم</button>
                    <button class="btn-add ai" onclick="addMessage('ai')"><i class="fas fa-robot"></i> رد ChatGPT</button>
                </div>
                <div class="control-section-title" style="margin-top: 25px; border-bottom: none; font-size: 13px; color: var(--text-muted);">
                    <i class="fas fa-list"></i> ترتيب المحادثة
                </div>
                <div id="messages-list"></div>
            </div>

            <button class="btn-download" id="btnDownload" onclick="captureChatGPT()"><i class="fas fa-camera"></i> حفظ الصورة بدقة 4K</button>
        </div>

        <div class="capture-container" id="captureArea">
            
            <div class="phone-status-bar">
                <div class="status-icons">
                    <i id="outSignal" class="fas fa-signal"></i>
                    <i id="outWifi" class="fas fa-wifi"></i>
                    <i id="outBattery" class="fas fa-battery-three-quarters" style="font-size: 13px;"></i>
                </div>
                <div id="outPhoneTime">10:50</div>
            </div>

            <div class="cg-header">
                <div class="cg-header-icon"><i class="fas fa-bars"></i></div>
                <div class="cg-model-selector">
                    <span id="outModelName">ChatGPT 4o</span>
                    <i class="fas fa-chevron-down"></i>
                </div>
                <div class="cg-header-icon"><i class="far fa-edit"></i></div>
            </div>

            <div class="cg-chat-area" id="outChatArea"></div>

            <div class="cg-input-area">
                <div class="cg-input-box">
                    <div class="cg-input-icons-left">
                        <i class="fas fa-plus-circle" style="color: #ececec;"></i>
                        <i class="fas fa-camera"></i>
                        <i class="far fa-image"></i>
                        <i class="fas fa-folder"></i>
                    </div>
                    <span class="cg-placeholder">Message ChatGPT...</span>
                    <div class="cg-send-btn"><i class="fas fa-microphone"></i></div>
                </div>
                <div class="cg-footer-text">ChatGPT can make mistakes. Check important info.</div>
            </div>

            <div class="android-nav-bar">
                <div class="nav-btn-recent"></div> <div class="nav-btn-home"></div> <div class="nav-btn-back"></div>   
            </div>

        </div>
    </div>

    <script>
        function updateStaticUI() {
            document.getElementById('outPhoneTime').innerText = document.getElementById('inPhoneTime').value;
            document.getElementById('outModelName').innerText = document.getElementById('inModelName').value || 'ChatGPT';
            
            const batteryStatus = document.getElementById('inBattery').value;
            const batIcon = document.getElementById('outBattery');
            if (batteryStatus === 'full') { batIcon.className = 'fas fa-battery-full'; batIcon.style.color = '#fff'; }
            else if (batteryStatus === 'three-quarters') { batIcon.className = 'fas fa-battery-three-quarters'; batIcon.style.color = '#fff'; }
            else if (batteryStatus === 'half') { batIcon.className = 'fas fa-battery-half'; batIcon.style.color = '#fff'; }
            else if (batteryStatus === 'low') { batIcon.className = 'fas fa-battery-quarter'; batIcon.style.color = '#ff3b30'; }

            document.getElementById('outWifi').style.display = document.getElementById('inWifi').value === '0' ? 'none' : 'inline-block';
            document.getElementById('outSignal').style.display = document.getElementById('inSignal').value === '0' ? 'none' : 'inline-block';
        }

        let messages = [];

        function addMessage(type) {
            const textInput = document.getElementById('newMsgText');
            const text = textInput.value.trim();
            if(!text) return; 

            messages.push({
                id: Date.now(),
                type: type,
                text: text
            });

            textInput.value = "";
            renderMessages();
        }

        function deleteMessage(id) {
            messages = messages.filter(m => m.id !== id);
            renderMessages();
        }

        function moveMsgUp(index) {
            if (index > 0) {
                [messages[index], messages[index - 1]] = [messages[index - 1], messages[index]];
                renderMessages();
            }
        }

        function moveMsgDown(index) {
            if (index < messages.length - 1) {
                [messages[index], messages[index + 1]] = [messages[index + 1], messages[index]];
                renderMessages();
            }
        }

        function renderMessages() {
            const listArea = document.getElementById('messages-list');
            const chatArea = document.getElementById('outChatArea');
            
            listArea.innerHTML = "";
            chatArea.innerHTML = "";

            messages.forEach((msg, index) => {
                const badgeClass = msg.type === 'user' ? 'badge-user' : 'badge-ai';
                const typeText = msg.type === 'user' ? 'USER' : 'ChatGPT';
                
                listArea.innerHTML += `
                    <div class="msg-list-item">
                        <span class="msg-type-badge ${badgeClass}">${typeText}</span>
                        <span class="msg-text-preview">${msg.text}</span>
                        <div style="display:flex; gap:2px;">
                            <button class="action-btn" onclick="moveMsgUp(${index})"><i class="fas fa-chevron-up"></i></button>
                            <button class="action-btn" onclick="moveMsgDown(${index})"><i class="fas fa-chevron-down"></i></button>
                            <button class="action-btn delete" onclick="deleteMessage(${msg.id})"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;

                let formattedText = msg.text.replace(/\n/g, '<br>');
                
                if (msg.type === 'user') {
                    chatArea.innerHTML += `
                        <div class="cg-user-row">
                            <div class="cg-user-bubble">${formattedText}</div>
                        </div>
                    `;
                } else {
                    // رسالة الذكاء الاصطناعي أصبحت نصية بالكامل بدون الأيقونة
                    chatArea.innerHTML += `
                        <div class="cg-ai-row">
                            <div class="cg-ai-content">
                                ${formattedText}
                                <div class="cg-action-icons">
                                    <i class="fas fa-volume-up"></i>
                                    <i class="far fa-copy"></i>
                                    <i class="fas fa-redo"></i>
                                    <i class="far fa-thumbs-up"></i>
                                    <i class="far fa-thumbs-down"></i>
                                </div>
                            </div>
                        </div>
                    `;
                }
            });

            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function captureChatGPT() {
            const btn = document.getElementById('btnDownload');
            if (btn.disabled) return;

            // 🚀 الإعلان المباشر اللي اتفقنا عليه
            window.open('https://www.effectivecpmnetwork.com/eekt4f7tz?key=65261256f343b49baa62f9a3fd6f401a', '_blank');

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري المعالجة...';
            btn.disabled = true;

            const captureArea = document.getElementById('captureArea');

            setTimeout(() => {
                html2canvas(captureArea, { 
                    scale: 5, 
                    backgroundColor: '#212121', 
                    useCORS: true 
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `ChatGPT_4K_${Date.now()}.png`;
                    link.href = canvas.toDataURL("image/png");
                    link.click();

                    btn.innerHTML = '<div style="display: flex; flex-direction: column; align-items: center; gap: 5px; line-height: 1.2;"><span style="font-size: 16px; color: #10b981;"><i class="fas fa-check-circle"></i> تم تحميل الصورة بنجاح</span><span style="font-size: 13px; font-weight: 500; color: #475569;"><i class="fas fa-sync-alt"></i> يرجى تحديث الصفحة للتحميل مجدداً</span></div>';


                    
                    setTimeout(() => {
                        alert("✅ تم تحميل الصورة بنجاح!\n\n⚠️ يرجى تحديث الصفحة (Refresh) للحفاظ على أداء المتصفح قبل تصميم صورة أخرى.");
                    }, 500);

                }).catch(err => {
                    console.error(err);
                    btn.innerHTML = '<i class="fas fa-sync-alt"></i> يرجى تحديث الصفحة';
                    alert("❌ حدث خطأ. يرجى تحديث الصفحة والمحاولة مجدداً.");
                });
            }, 150);
        }
        
        window.onload = () => {
            updateStaticUI();
            
            document.getElementById('newMsgText').value = "اكتب لي سكريبت برمجي بلغة JS لمشروعي الجديد الخاص بريال مدريد.";
            addMessage('user');
            
            document.getElementById('newMsgText').value = "بالتأكيد! إليك الكود البرمجي لمشروعك، وكما يقولون: Hala Madrid! 👑🤍\n\nconsole.log('Real Madrid is the best');";
            addMessage('ai');
        };
    </script>
</body>
</html>
