<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محادثة ChatGPT | النسخة الأصلية المطابقة</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* ألوان بيئة العمل */
            --bg-site: #0b0f19; 
            --panel-bg: #151b2b;
            --primary-neon: #10a37f;
            
            /* ألوان تطبيق ChatGPT الرسمية */
            --gpt-bg: #000000; 
            --gpt-user-bg: #2f2f2f; 
            --gpt-text: #ececec; 
            --gpt-muted: #8e8e8e; 
            
            --font-ar: 'Tajawal', sans-serif;
            --font-en: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-site);
            color: #fff;
            font-family: var(--font-ar);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 15px;
            -webkit-font-smoothing: antialiased;
        }

        .workspace {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            width: 100%;
            max-width: 1000px;
            justify-content: center;
        }

        /* لوحة التحكم */
        .controls {
            background: var(--panel-bg);
            border: 1px solid #1e293b;
            padding: 25px;
            border-radius: 16px;
            flex: 1;
            min-width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .controls h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: var(--primary-neon);
        }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 13px; color: #cbd5e1; }
        .input-group select, .input-group textarea {
            width: 100%; padding: 12px; background: #0f172a; border: 1px solid #1e293b;
            color: #fff; border-radius: 10px; outline: none; font-size: 14px;
            font-family: var(--font-ar);
        }
        .input-group textarea { resize: vertical; min-height: 80px; }

        .btn-download {
            width: 100%; background: #fff; color: #000; font-weight: bold;
            padding: 15px; font-size: 16px; border: none; border-radius: 30px;
            cursor: pointer; transition: 0.3s; margin-top: 10px; font-family: var(--font-ar);
        }
        .btn-download:hover { transform: translateY(-2px); }

        /* شاشة الموبايل */
        .capture-container {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 9 / 16;
            background-color: var(--gpt-bg);
            border: 1px solid #222;
            border-radius: 35px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .gpt-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 20px 10px 20px;
            background: var(--gpt-bg);
            z-index: 10;
        }

        .gpt-menu-icon { font-size: 20px; color: var(--gpt-text); cursor: pointer; }
        
        .gpt-model-selector {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: var(--font-en);
            font-weight: 600;
            font-size: 17px;
            color: var(--gpt-text);
        }
        
        .gpt-model-selector .chevron { font-size: 14px; color: var(--gpt-muted); }
        .gpt-new-chat { color: var(--gpt-text); cursor: pointer; }

        .gpt-chat-area {
            flex: 1;
            padding: 20px 16px;
            overflow-y: hidden;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .msg-user {
            align-self: flex-end;
            background: var(--gpt-user-bg);
            padding: 10px 16px;
            border-radius: 20px;
            max-width: 85%;
            font-size: 16px;
            line-height: 1.5;
            color: var(--gpt-text);
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        /* رسالة الذكاء الاصطناعي (تم حذف الأيقونة لتطابق التطبيق الرسمي) */
        .msg-ai {
            align-self: flex-start;
            max-width: 95%;
            font-size: 16px;
            line-height: 1.6;
            color: var(--gpt-text);
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .gpt-input-bar {
            padding: 10px 16px 20px 16px;
            background: var(--gpt-bg);
        }

        .gpt-input-wrapper {
            display: flex;
            align-items: center;
            background: var(--gpt-user-bg);
            border-radius: 24px;
            padding: 8px 12px;
            gap: 12px;
        }

        .gpt-plus-btn {
            color: var(--gpt-text);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gpt-placeholder {
            flex: 1;
            color: var(--gpt-muted);
            font-size: 15px;
            font-family: var(--font-en);
        }

        .gpt-send-btn {
            display: flex;
            align-items: center;
            justify-content: center;
        }

    </style>
</head>
<body>

    <div class="workspace">
        
        <div class="controls">
            <h2><i class="fas fa-sliders-h"></i> إعدادات محادثة ChatGPT</h2>
            
            <div class="input-group">
                <label>إصدار النموذج (Model):</label>
                <select id="inModel" onchange="updateLive()">
                    <option value="ChatGPT 4o">ChatGPT 4o</option>
                    <option value="ChatGPT 4">ChatGPT 4</option>
                    <option value="ChatGPT 3.5">ChatGPT 3.5</option>
                </select>
            </div>

            <div class="input-group">
                <label>رسالة المستخدم (أنت):</label>
                <textarea id="inUserMsg" oninput="updateLive()">للمعلومة، شعار ChatGPT لا يوجد داخل المحادثة نفسها في التطبيق.</textarea>
            </div>

            <div class="input-group">
                <label>رد الذكاء الاصطناعي (ChatGPT):</label>
                <textarea id="inAiMsg" oninput="updateLive()" style="min-height: 120px;">ملاحظة دقيقة جداً وممتازة! 

تم حذف الشعار تماماً لكي تتطابق الواجهة مع التطبيق الرسمي بنسبة 100%. هذا الأمر أدى أيضاً إلى تنظيف الكود بالكامل، وحل مشكلة التشوه والسواد بشكل نهائي.</textarea>
            </div>

            <button class="btn-download" onclick="captureChatGPT()"><i class="fas fa-camera"></i> حفظ الصورة بدقة 4K</button>
        </div>

        <div class="capture-container" id="captureArea">
            
            <div class="gpt-header">
                <i class="fas fa-bars gpt-menu-icon"></i>
                <div class="gpt-model-selector">
                    <span id="outModel" style="font-family: var(--font-en);">ChatGPT 4o</span>
                    <i class="fas fa-chevron-right chevron"></i>
                </div>
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="gpt-new-chat"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
            </div>

            <div class="gpt-chat-area">
                
                <div class="msg-user" id="outUserMsg">للمعلومة، شعار ChatGPT لا يوجد داخل المحادثة نفسها في التطبيق.</div>
                
                <div class="msg-ai" id="outAiMsg">ملاحظة دقيقة جداً وممتازة! 

تم حذف الشعار تماماً لكي تتطابق الواجهة مع التطبيق الرسمي بنسبة 100%. هذا الأمر أدى أيضاً إلى تنظيف الكود بالكامل، وحل مشكلة التشوه والسواد بشكل نهائي.</div>

            </div>

            <div class="gpt-input-bar">
                <div class="gpt-input-wrapper">
                    <div class="gpt-plus-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                    </div>
                    
                    <span class="gpt-placeholder">Message</span>
                    
                    <div class="gpt-send-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
                            <circle cx="16" cy="16" r="16" fill="#ffffff" />
                            <g transform="translate(4, 4)">
                                <path d="M12 19V5M5 12l7-7 7 7" stroke="#000000" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                            </g>
                        </svg>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        function updateLive() {
            document.getElementById('outModel').innerText = document.getElementById('inModel').value;
            
            const userMsg = document.getElementById('inUserMsg').value;
            document.getElementById('outUserMsg').innerText = userMsg ? userMsg : '...';
            
            const aiMsg = document.getElementById('inAiMsg').value;
            document.getElementById('outAiMsg').innerText = aiMsg ? aiMsg : '...';
        }

        function captureChatGPT() {
            const captureArea = document.getElementById('captureArea');
            
            // دقة 4K صريحة مع ضمان أداء سريع وخالي من الشوائب
            html2canvas(captureArea, { 
                scale: 5, 
                backgroundColor: '#000000'
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `ChatGPT_Mockup_4K_${Date.now()}.png`;
                link.href = canvas.toDataURL("image/png", 1.0);
                link.click();
            });
        }
        
        window.onload = updateLive;
    </script>
</body>
</html>
