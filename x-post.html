<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منشور X (تويتر) | سكرين شوت مقاس تيك توك 4K</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-site: #0b0f19; 
            --panel-bg: #151b2b;
            --primary-color: #1d9bf0; /* لون X الأزرق */
            
            --x-bg: #000000; 
            --x-card-bg: #000000;
            --x-text: #e7e9ea;
            --x-muted: #71767b;
            --x-border: #2f3336;
            
            --font-ar: 'Tajawal', sans-serif;
            --font-en: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { background-color: var(--bg-site); color: #fff; font-family: var(--font-ar); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 30px 15px; -webkit-font-smoothing: antialiased;}

        .workspace { display: flex; flex-wrap: wrap; gap: 30px; width: 100%; max-width: 1050px; justify-content: center; align-items: flex-start; }

        /* ----- لوحة التحكم ----- */
        .controls { background: var(--panel-bg); border: 1px solid #1e293b; padding: 25px; border-radius: 12px; flex: 1; min-width: 360px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .controls h2 { font-size: 18px; margin-bottom: 20px; color: var(--x-text); display: flex; align-items: center; gap: 10px; }
        .controls h2 i { color: #fff; }
        
        .control-section { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; border: 1px solid #1e293b; margin-bottom: 20px; }
        .control-section-title { font-size: 14px; color: var(--primary-color); margin-bottom: 15px; font-weight: 700; border-bottom: 1px solid #1e293b; padding-bottom: 8px; }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 13px; color: #cbd5e1; }
        .input-group input, .input-group textarea, .input-group select { width: 100%; padding: 10px 12px; background: #0f172a; border: 1px solid #1e293b; color: #fff; border-radius: 6px; outline: none; font-size: 14px; font-family: var(--font-ar); }
        .input-group textarea { resize: vertical; min-height: 80px; }
        
        .file-upload-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 15px; }
        .custom-file-upload { display: block; width: 100%; padding: 10px; background: #0f172a; border: 1px dashed var(--primary-color); color: var(--primary-color); border-radius: 6px; text-align: center; cursor: pointer; font-size: 13px; transition: 0.3s; }
        .custom-file-upload:hover { background: rgba(29, 155, 240, 0.1); }

        .toggle-container { display: flex; align-items: center; gap: 10px; cursor: pointer; margin-bottom: 15px; }
        .toggle-checkbox { display: none; }
        .toggle-btn { width: 44px; height: 24px; background: #334155; border-radius: 20px; position: relative; transition: 0.3s; }
        .toggle-btn::after { content: ''; position: absolute; top: 2px; right: 2px; width: 20px; height: 20px; background: #fff; border-radius: 50%; transition: 0.3s; }
        .toggle-checkbox:checked + .toggle-btn { background: var(--primary-color); }
        .toggle-checkbox:checked + .toggle-btn::after { transform: translateX(-20px); }
        
        .btn-download { width: 100%; background: #fff; color: #000; font-weight: bold; padding: 15px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-top: 10px; display: flex; justify-content: center; align-items: center; gap: 8px;}
        .btn-download:hover { opacity: 0.9; }
        .btn-download:disabled { opacity: 0.8; cursor: not-allowed; background: #475569; color: #fff; }

        /* ----- منطقة التصوير (مقاس تيك توك 9:16) ----- */
        .capture-container { width: 380px; aspect-ratio: 9 / 16; background-color: var(--x-bg); border-radius: 0; overflow: hidden; position: relative; display: flex; flex-direction: column; border: 1px solid #334155; }

        .phone-status-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 18px 4px 18px; background: transparent; font-family: var(--font-en); font-size: 13px; color: #ffffff; font-weight: 500; }
        .status-icons { display: flex; align-items: center; gap: 6px; color: #fff; }
        .status-icons i { font-size: 11px; }

        /* حاوية التغريدة المنتصفة */
        .x-card-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 15px; }
        
        .x-card { width: 100%; background-color: var(--x-card-bg); border: 1px solid var(--x-border); padding: 16px; border-radius: 16px; color: var(--x-text); }

        /* رأس التغريدة */
        .x-header { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .x-header-left { display: flex; gap: 10px; }
        .x-avatar { width: 44px; height: 44px; border-radius: 50%; background-color: #333; background-size: cover; background-position: center; }
        .x-user-meta { display: flex; flex-direction: column; justify-content: center; }
        .x-name-wrapper { display: flex; align-items: center; gap: 4px; margin-bottom: 2px; }
        .x-name { font-family: var(--font-en); font-weight: 700; font-size: 15px; color: var(--x-text); line-height: 1; }
        
        /* علامة التوثيق */
        .x-verified-icon { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; position: relative; }
        .x-verified-icon .fa-certificate { color: var(--primary-color); position: absolute; font-size: 18px; }
        .x-verified-icon .fa-check { color: var(--x-bg); position: absolute; font-size: 10px; z-index: 1; }

        .x-handle { font-family: var(--font-en); font-size: 15px; color: var(--x-muted); direction: ltr; text-align: right; line-height: 1; }
        .x-more-icon { color: var(--x-muted); font-size: 18px; }

        /* نص التغريدة */
        .x-body { font-family: var(--font-ar); font-size: 17px; line-height: 1.5; margin-bottom: 12px; white-space: pre-wrap; word-wrap: break-word; color: var(--x-text); }

        /* الوقت والتاريخ والمشاهدات */
        .x-datetime { font-family: var(--font-ar); font-size: 15px; color: var(--x-muted); display: flex; align-items: center; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
        .x-datetime .x-views { color: var(--x-text); font-weight: bold; font-family: var(--font-en); }
        .x-dot { padding: 0 4px; font-family: var(--font-en); }

        .x-hr { height: 1px; background-color: var(--x-border); margin: 0; width: 100%; border: none; margin-bottom: 12px;}

        /* أزرار التفاعل */
        .x-action-bar { display: flex; justify-content: space-between; align-items: center; color: var(--x-muted); font-family: var(--font-en); font-size: 13px; }
        .x-action-item { display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .x-action-item i { font-size: 18px; }
        
        /* التلوين عند تفاعل محدد (اختياري) */
        .action-liked { color: #f91880; }
        .action-reposted { color: #00ba7c; }

    </style>
</head>
<body>

    <div class="workspace">
        
        <div class="controls">
            <h2><i class="fa-brands fa-x-twitter"></i> صانع منشورات X (مقاس تيك توك)</h2>
            
            <div class="control-section">
                <div class="control-section-title">شريط الإشعارات (Status Bar)</div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div class="input-group">
                        <label>وقت الموبايل:</label>
                        <input type="text" id="inPhoneTime" value="10:50" oninput="updateStaticUI()" dir="ltr">
                    </div>
                    <div class="input-group">
                        <label>البطارية:</label>
                        <select id="inBattery" onchange="updateStaticUI()">
                            <option value="full">ممتلئ (100%)</option>
                            <option value="three-quarters">جيد (75%)</option>
                            <option value="half">نصف (50%)</option>
                            <option value="low">ضعيف (أحمر)</option>
                        </select>
                    </div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div class="input-group">
                        <label>الـ Wi-Fi:</label>
                        <select id="inWifi" onchange="updateStaticUI()">
                            <option value="3">قوي</option>
                            <option value="0">مخفي</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>الشبكة (Signal):</label>
                        <select id="inSignal" onchange="updateStaticUI()">
                            <option value="4">تغطية كاملة</option>
                            <option value="0">لا توجد خدمة</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <div class="control-section-title">بيانات الحساب</div>
                <div class="file-upload-grid">
                    <label class="custom-file-upload">
                        <input type="file" accept="image/*" onchange="updateAvatar(event)" style="display:none;">
                        <i class="fas fa-user-circle"></i> صورة الحساب
                    </label>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div class="input-group">
                        <label>الاسم:</label>
                        <input type="text" id="inName" value="Eng. Abd" oninput="updateStaticUI()">
                    </div>
                    <div class="input-group">
                        <label>المعرف (يوزرنيم):</label>
                        <input type="text" id="inUsername" value="eng_abd2001" oninput="updateStaticUI()" dir="ltr">
                    </div>
                </div>
                <label class="toggle-container">
                    <input type="checkbox" id="inVerified" class="toggle-checkbox" onchange="updateStaticUI()" checked>
                    <div class="toggle-btn"></div>
                    <span style="font-size: 14px; color: #cbd5e1; margin-right: 10px;">توثيق الحساب (العلامة الزرقاء)</span>
                </label>
            </div>

            <div class="control-section">
                <div class="control-section-title">نص التغريدة والتفاعل</div>
                <div class="input-group">
                    <label>نص التغريدة:</label>
                    <textarea id="inText" oninput="updateStaticUI()">هلا مدريد! نحن أسياد أوروبا مرة أخرى! 🏆🤍 الملوك دائماً في القمة.&#10;#RealMadrid #UCL</textarea>
                </div>
                
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
                    <div class="input-group">
                        <label>الوقت:</label>
                        <input type="text" id="inTime" value="١٠:٠٤ م" oninput="updateStaticUI()">
                    </div>
                    <div class="input-group">
                        <label>التاريخ:</label>
                        <input type="text" id="inDate" value="٢٣ أبريل ٢٦" oninput="updateStaticUI()">
                    </div>
                    <div class="input-group">
                        <label>المشاهدات:</label>
                        <input type="text" id="inViews" value="1.5M" oninput="updateStaticUI()" dir="ltr">
                    </div>
                </div>

                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
                    <div class="input-group">
                        <label>الردود:</label>
                        <input type="text" id="inReplies" value="12K" oninput="updateStaticUI()" dir="ltr">
                    </div>
                    <div class="input-group">
                        <label>إعادة النشر:</label>
                        <input type="text" id="inReposts" value="5K" oninput="updateStaticUI()" dir="ltr">
                    </div>
                    <div class="input-group">
                        <label>الإعجابات:</label>
                        <input type="text" id="inLikes" value="45K" oninput="updateStaticUI()" dir="ltr">
                    </div>
                </div>
            </div>

            <button class="btn-download" id="btnDownload" onclick="captureX()"><i class="fas fa-camera"></i> حفظ الصورة بدقة 4K</button>
        </div>

        <!-- ----- السكرين شوت (الخام) ----- -->
        <div class="capture-container" id="captureArea">
            
            <div class="phone-status-bar">
                <div class="status-icons">
                    <i id="outSignal" class="fas fa-signal"></i>
                    <i id="outWifi" class="fas fa-wifi"></i>
                    <i id="outBattery" class="fas fa-battery-three-quarters" style="font-size: 13px;"></i>
                </div>
                <div id="outPhoneTime">10:50</div>
            </div>

            <div class="x-card-wrapper">
                <div class="x-card">
                    <div class="x-header">
                        <div class="x-header-left">
                            <div class="x-avatar" id="outAvatar"></div>
                            <div class="x-user-meta">
                                <div class="x-name-wrapper">
                                    <span class="x-name" id="outName">Eng. Abd</span>
                                    <div class="x-verified-icon" id="outVerified">
                                        <i class="fas fa-certificate"></i>
                                        <i class="fas fa-check"></i>
                                    </div>
                                </div>
                                <span class="x-handle" id="outUsername">@eng_abd2001</span>
                            </div>
                        </div>
                        <i class="fas fa-ellipsis-h x-more-icon"></i>
                    </div>

                    <div class="x-body" id="outText">هلا مدريد! نحن أسياد أوروبا مرة أخرى! 🏆🤍 الملوك دائماً في القمة.<br>#RealMadrid #UCL</div>

                    <div class="x-datetime">
                        <span id="outTime">١٠:٠٤ م</span>
                        <span class="x-dot">·</span>
                        <span id="outDate">٢٣ أبريل ٢٦</span>
                        <span class="x-dot">·</span>
                        <span><span class="x-views" id="outViews">1.5M</span> Views</span>
                    </div>

                    <hr class="x-hr">

                    <div class="x-action-bar">
                        <div class="x-action-item"><i class="far fa-comment"></i> <span id="outReplies">12K</span></div>
                        <div class="x-action-item action-reposted"><i class="fas fa-retweet"></i> <span id="outReposts">5K</span></div>
                        <div class="x-action-item action-liked"><i class="fas fa-heart"></i> <span id="outLikes">45K</span></div>
                        <div class="x-action-item"><i class="far fa-bookmark"></i></div>
                        <div class="x-action-item"><i class="fas fa-external-link-alt"></i></div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        function updateStaticUI() {
            // شريط الإشعارات
            document.getElementById('outPhoneTime').innerText = document.getElementById('inPhoneTime').value;
            
            const batteryStatus = document.getElementById('inBattery').value;
            const batIcon = document.getElementById('outBattery');
            if (batteryStatus === 'full') { batIcon.className = 'fas fa-battery-full'; batIcon.style.color = '#fff'; }
            else if (batteryStatus === 'three-quarters') { batIcon.className = 'fas fa-battery-three-quarters'; batIcon.style.color = '#fff'; }
            else if (batteryStatus === 'half') { batIcon.className = 'fas fa-battery-half'; batIcon.style.color = '#fff'; }
            else if (batteryStatus === 'low') { batIcon.className = 'fas fa-battery-quarter'; batIcon.style.color = '#ff3b30'; }

            document.getElementById('outWifi').style.display = document.getElementById('inWifi').value === '0' ? 'none' : 'inline-block';
            document.getElementById('outSignal').style.display = document.getElementById('inSignal').value === '0' ? 'none' : 'inline-block';

            // بيانات التغريدة
            document.getElementById('outName').innerText = document.getElementById('inName').value || 'الاسم';
            document.getElementById('outUsername').innerText = '@' + (document.getElementById('inUsername').value || 'username');
            document.getElementById('outVerified').style.display = document.getElementById('inVerified').checked ? 'inline-flex' : 'none';
            
            document.getElementById('outText').innerHTML = document.getElementById('inText').value.replace(/\n/g, '<br>');
            
            document.getElementById('outTime').innerText = document.getElementById('inTime').value;
            document.getElementById('outDate').innerText = document.getElementById('inDate').value;
            document.getElementById('outViews').innerText = document.getElementById('inViews').value;
            
            document.getElementById('outReplies').innerText = document.getElementById('inReplies').value;
            document.getElementById('outReposts').innerText = document.getElementById('inReposts').value;
            document.getElementById('outLikes').innerText = document.getElementById('inLikes').value;
        }

        function updateAvatar(event) {
            const reader = new FileReader();
            reader.onload = function() { document.getElementById('outAvatar').style.backgroundImage = `url(${reader.result})`; };
            if(event.target.files[0]) reader.readAsDataURL(event.target.files[0]);
        }

        function captureX() {
            const btn = document.getElementById('btnDownload');
            if (btn.disabled) return;



 // 🚀 فتح الإعلان المباشر فور الضغط
            window.open('https://www.effectivecpmnetwork.com/eekt4f7tz?key=65261256f343b49baa62f9a3fd6f401a');



            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري المعالجة...';
            btn.disabled = true;

            const captureArea = document.getElementById('captureArea');

            setTimeout(() => {
                html2canvas(captureArea, { 
                    scale: 5, 
                    backgroundColor: '#000000', 
                    useCORS: true 
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `X_Post_4K_${Date.now()}.png`;
                    link.href = canvas.toDataURL("image/png");
                    link.click();

                    btn.innerHTML = '<div style="display: flex; flex-direction: column; gap: 4px; text-align: center;"><span style="color: #10b981; font-size: 16px;"><i class="fas fa-check-circle"></i> تم تحميل الصورة بنجاح</span><span style="color: #e2e8f0; font-size: 13px; font-weight: normal;">يرجى تحديث الصفحة للتحميل مجدداً <i class="fas fa-sync-alt"></i></span></div>';

                    
                    setTimeout(() => {
                        alert("✅ تم تحميل الصورة بنجاح!\n\n⚠️ يرجى تحديث الصفحة (Refresh) للحفاظ على أداء المتصفح قبل تصميم صورة أخرى.");
                    }, 500);

                }).catch(err => {
                    console.error(err);
                    btn.innerHTML = '<i class="fas fa-sync-alt"></i> يرجى تحديث الصفحة';
                    alert("❌ حدث خطأ. يرجى تحديث الصفحة والمحاولة مجدداً.");
                });
            }, 150);
        }
        
        window.onload = () => {
            updateStaticUI();
        };
    </script>
</body>
</html>
