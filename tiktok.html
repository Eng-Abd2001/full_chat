<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محادثة TikTok | سكرين شوت خام 4K</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-site: #0b0f19; 
            --panel-bg: #151b2b;
            --primary-color: #fe2c55; /* لون تيك توك */
            
            /* ألوان تيك توك الرسمية */
            --tk-bg: #000000; 
            --tk-header: #000000;
            --tk-received: #262626;
            --tk-sent: #262626; 
            --tk-text: #ffffff;
            --tk-muted: #838383;
            
            --font-ar: 'Tajawal', sans-serif;
            --font-en: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { background-color: var(--bg-site); color: #fff; font-family: var(--font-ar); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 30px 15px; }

        .workspace { display: flex; flex-wrap: wrap; gap: 30px; width: 100%; max-width: 1050px; justify-content: center; align-items: flex-start; }

        /* ----- لوحة التحكم ----- */
        .controls { background: var(--panel-bg); border: 1px solid #1e293b; padding: 25px; border-radius: 12px; flex: 1; min-width: 340px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .controls h2 { font-size: 18px; margin-bottom: 20px; color: var(--primary-color); display: flex; align-items: center; gap: 10px; }
        
        .control-section { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; border: 1px solid #1e293b; margin-bottom: 20px; }
        .control-section-title { font-size: 14px; color: var(--primary-color); margin-bottom: 15px; font-weight: 700; border-bottom: 1px solid #1e293b; padding-bottom: 8px; }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 13px; color: #cbd5e1; }
        .input-group input, .input-group textarea, .input-group select { width: 100%; padding: 10px 12px; background: #0f172a; border: 1px solid #1e293b; color: #fff; border-radius: 6px; outline: none; font-size: 14px; font-family: var(--font-ar); }
        .input-group textarea { resize: vertical; min-height: 60px; }
        
        .btn-download { width: 100%; background: var(--primary-color); color: #fff; font-weight: bold; padding: 15px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; }

        /* ----- السكرين شوت (خام) ----- */
        .capture-container { width: 380px; aspect-ratio: 9 / 19; background-color: var(--tk-bg); overflow: hidden; position: relative; display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .phone-status-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 18px 4px 18px; background: var(--tk-header); font-family: var(--font-en); font-size: 13px; color: #ffffff; font-weight: 500; }
        .status-icons { display: flex; align-items: center; gap: 6px; height: 14px; }
        .status-icons svg { display: block; height: 100%; }

        /* هيدر تيك توك */
        .tk-header { display: flex; align-items: center; padding: 10px 15px; background: var(--tk-header); border-bottom: 1px solid #2f2f2f; }
        .tk-back { color: var(--tk-text); font-size: 20px; margin-left: 15px; cursor: pointer; }
        .tk-avatar { width: 36px; height: 36px; border-radius: 50%; background-color: #333; background-size: cover; background-position: center; }
        .tk-user-info { display: flex; flex-direction: column; }
        .tk-name { color: var(--tk-text); font-size: 15px; font-weight: 700; font-family: var(--font-en); }
        .tk-status { color: var(--tk-muted); font-size: 12px; }

        .tk-chat-area { flex: 1; padding: 20px 15px; display: flex; flex-direction: column; gap: 12px; overflow: hidden; }
        .tk-date-badge { align-self: center; color: var(--tk-muted); font-size: 12px; margin-bottom: 10px; }

        .msg-received { align-self: flex-start; background: var(--tk-received); color: var(--tk-text); padding: 10px 14px; border-radius: 18px; font-size: 15px; max-width: 80%; }
        .msg-sent { align-self: flex-end; background: var(--tk-sent); color: var(--tk-text); padding: 10px 14px; border-radius: 18px; font-size: 15px; max-width: 80%; }
        
        .tk-input-area { padding: 10px; background: var(--tk-bg); display: flex; align-items: center; gap: 10px; }
        .tk-input-box { flex: 1; background: #161616; border-radius: 20px; padding: 10px 15px; display: flex; align-items: center; color: var(--tk-muted); font-size: 15px; }

        .android-nav-bar { display: flex; justify-content: space-around; align-items: center; height: 44px; background: #000000; padding: 0 40px; }
        .nav-btn-recent { width: 14px; height: 14px; border: 2px solid #888; border-radius: 2px; }
        .nav-btn-home { width: 16px; height: 16px; border: 2px solid #888; border-radius: 50%; }
        .nav-btn-back { width: 0; height: 0; border-top: 7px solid transparent; border-bottom: 7px solid transparent; border-right: 11px solid #888; }
    </style>
</head>
<body>

    <div class="workspace">
        <div class="controls">
            <h2><i class="fa-brands fa-tiktok"></i> إعدادات سكرين شوت TikTok</h2>
            
            <div class="control-section">
                <div class="control-section-title">شريط الإشعارات</div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div class="input-group">
                        <label>وقت الموبايل:</label>
                        <input type="text" id="inPhoneTime" value="10:50" oninput="updateLive()" dir="ltr">
                    </div>
                    <div class="input-group">
                        <label>البطارية:</label>
                        <select id="inBattery" onchange="updateLive()">
                            <option value="full">ممتلئ (100%)</option>
                            <option value="three-quarters">جيد (75%)</option>
                            <option value="half">نصف (50%)</option>
                            <option value="low">ضعيف (أحمر)</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <div class="control-section-title">إعدادات المحادثة</div>
                <div class="input-group">
                    <label>اسم المستخدم:</label>
                    <input type="text" id="inName" value="TikTokUser" oninput="updateLive()">
                </div>
                <div class="input-group">
                    <label>رسالة الطرف الآخر:</label>
                    <textarea id="inMsg1" oninput="updateLive()">مرحباً! كيف حالك؟</textarea>
                </div>
                <div class="input-group">
                    <label>رسالتك أنت:</label>
                    <textarea id="inMsg2" oninput="updateLive()">أهلاً، أنا بخير! أعمل على تحديث الواجهة.</textarea>
                </div>
            </div>

            <button class="btn-download" onclick="captureTikTok()"><i class="fas fa-camera"></i> حفظ الصورة (4K)</button>
        </div>

        <div class="capture-container" id="captureArea">
            <div class="phone-status-bar">
                <div class="status-icons">
                    <svg id="outSignal" viewBox="0 0 16 12" fill="#ffffff" width="16"><rect id="sig-1" x="0" y="8" width="2.5" height="4" rx="1"/><rect id="sig-2" x="4.5" y="5.5" width="2.5" height="6.5" rx="1"/><rect id="sig-3" x="9" y="2.5" width="2.5" height="9.5" rx="1"/><rect id="sig-4" x="13.5" y="0" width="2.5" height="12" rx="1"/></svg>
                    <svg id="outWifi" viewBox="0 0 18 13" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18"><path id="wifi-3" d="M1 3.5 Q9 -1.5 17 3.5" /><path id="wifi-2" d="M4.5 7 Q9 4 13.5 7" /><path id="wifi-1" d="M8 10.5 Q9 9.5 10 10.5" stroke-width="2.5"/></svg>
                    <svg id="outBattery" viewBox="0 0 24 12" fill="none" width="24"><rect x="1" y="1" width="20" height="10" rx="2" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/><path d="M23 4V8" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.6"/><rect id="bat-fill" x="3" y="3" width="16" height="6" rx="1" fill="#ffffff"/></svg>
                </div>
                <div id="outPhoneTime">10:50</div>
            </div>

            <div class="tk-header">
                <div class="tk-back"><i class="fas fa-arrow-left"></i></div>
                <div class="tk-avatar" id="outAvatar"></div>
                <div class="tk-user-info" style="margin-right: 10px;">
                    <span class="tk-name" id="outName">TikTokUser</span>
                    <span class="tk-status">Active now</span>
                </div>
            </div>

            <div class="tk-chat-area">
                <div class="tk-date-badge">Today</div>
                <div class="msg-received" id="outMsg1">مرحباً! كيف حالك؟</div>
                <div class="msg-sent" id="outMsg2">أهلاً، أنا بخير! أعمل على تحديث الواجهة.</div>
            </div>

            <div class="tk-input-area">
                <i class="fa-solid fa-circle-plus" style="font-size:22px; color:var(--tk-text)"></i>
                <div class="tk-input-box">Send a message...</div>
                <i class="fa-solid fa-gift" style="font-size:20px; color:var(--tk-text)"></i>
                <i class="fa-solid fa-camera" style="font-size:20px; color:var(--tk-text)"></i>
            </div>

            <div class="android-nav-bar">
                <div class="nav-btn-recent"></div> <div class="nav-btn-home"></div> <div class="nav-btn-back"></div>
            </div>
        </div>
    </div>

    <script>
        function updateLive() {
            document.getElementById('outPhoneTime').innerText = document.getElementById('inPhoneTime').value;
            document.getElementById('outName').innerText = document.getElementById('inName').value || 'Username';
            document.getElementById('outMsg1').innerText = document.getElementById('inMsg1').value;
            document.getElementById('outMsg2').innerText = document.getElementById('inMsg2').value;

            // تحديث البطارية (بما فيها الـ 75%)
            const batteryStatus = document.getElementById('inBattery').value;
            const batFill = document.getElementById('bat-fill');
            if (batteryStatus === 'full') { batFill.setAttribute('width', '16'); batFill.setAttribute('fill', '#ffffff'); }
            else if (batteryStatus === 'three-quarters') { batFill.setAttribute('width', '12'); batFill.setAttribute('fill', '#ffffff'); }
            else if (batteryStatus === 'half') { batFill.setAttribute('width', '8'); batFill.setAttribute('fill', '#ffffff'); }
            else if (batteryStatus === 'low') { batFill.setAttribute('width', '3'); batFill.setAttribute('fill', '#ff3b30'); }
        }

        function updateAvatar(event) {
            const reader = new FileReader();
            reader.onload = function() { document.getElementById('outAvatar').style.backgroundImage = `url(${reader.result})`; };
            if(event.target.files[0]) reader.readAsDataURL(event.target.files[0]);
        }

        function captureTikTok() {
            html2canvas(document.getElementById('captureArea'), { scale: 5, backgroundColor: '#000000', useCORS: true }).then(canvas => {
                const link = document.createElement('a');
                link.download = `TikTok_Screenshot_4K_${Date.now()}.png`;
                link.href = canvas.toDataURL("image/png", 1.0);
                link.click();
            });
        }
        window.onload = updateLive;
    </script>
</body>
</html>
