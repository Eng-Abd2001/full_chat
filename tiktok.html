<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محادثة TikTok | سكرين شوت خام (بكسل-بيرفكت)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-site: #0b0f19; 
            --panel-bg: #151b2b;
            --primary-color: #fe2c55; /* لون تيك توك */
            
            /* ألوان تيك توك الرسمية بالدارك مود */
            --tk-bg: #000000; 
            --tk-header: #000000;
            --tk-received: #252525;
            --tk-sent: #20D5EC; /* أزرق سماوي (سيان) الخاص بتيك توك */
            --tk-text: #ffffff;
            --tk-sent-text: #000000; /* النص أسود داخل الفقاعة السماوية */
            --tk-muted: #838383;
            
            --font-ar: 'Tajawal', sans-serif;
            --font-en: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { background-color: var(--bg-site); color: #fff; font-family: var(--font-ar); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 30px 15px; }

        .workspace { display: flex; flex-wrap: wrap; gap: 30px; width: 100%; max-width: 1050px; justify-content: center; align-items: flex-start; }

        /* ----- لوحة التحكم ----- */
        .controls { background: var(--panel-bg); border: 1px solid #1e293b; padding: 25px; border-radius: 12px; flex: 1; min-width: 340px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .controls h2 { font-size: 18px; margin-bottom: 20px; color: var(--primary-color); display: flex; align-items: center; gap: 10px; }
        
        .control-section { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; border: 1px solid #1e293b; margin-bottom: 20px; }
        .control-section-title { font-size: 14px; color: var(--primary-color); margin-bottom: 15px; font-weight: 700; border-bottom: 1px solid #1e293b; padding-bottom: 8px; }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 13px; color: #cbd5e1; }
        .input-group input, .input-group textarea, .input-group select { width: 100%; padding: 10px 12px; background: #0f172a; border: 1px solid #1e293b; color: #fff; border-radius: 6px; outline: none; font-size: 14px; font-family: var(--font-ar); }
        .input-group textarea { resize: vertical; min-height: 60px; }
        
        .file-upload-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 15px; }
        .custom-file-upload { display: block; width: 100%; padding: 10px; background: #0f172a; border: 1px dashed var(--primary-color); color: var(--primary-color); border-radius: 6px; text-align: center; cursor: pointer; font-size: 13px; }
        
        .btn-download { width: 100%; background: var(--primary-color); color: #fff; font-weight: bold; padding: 15px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; }

        /* ----- السكرين شوت (خام) ----- */
        .capture-container { width: 380px; aspect-ratio: 9 / 19; background-color: var(--tk-bg); overflow: hidden; position: relative; display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .phone-status-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 18px 4px 18px; background: var(--tk-header); font-family: var(--font-en); font-size: 13px; color: #ffffff; font-weight: 500; z-index: 20;}
        .status-icons { display: flex; align-items: center; gap: 6px; height: 14px; }
        .status-icons svg { display: block; height: 100%; }

        /* هيدر تيك توك الأصلي */
        .tk-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 15px; background: var(--tk-header); border-bottom: 1px solid #1a1a1a; }
        .tk-header-left { display: flex; align-items: center; gap: 15px; }
        .tk-back { color: var(--tk-text); font-size: 18px; cursor: pointer; }
        
        /* الاسم مع سهم صغير بالمنتصف */
        .tk-user-title { display: flex; align-items: center; gap: 5px; font-family: var(--font-en); font-weight: 700; font-size: 16px; }
        .tk-user-title i { font-size: 12px; color: var(--tk-text); }
        
        .tk-header-icons { display: flex; gap: 20px; color: var(--tk-text); font-size: 18px; }

        .tk-chat-area { flex: 1; padding: 20px 15px; display: flex; flex-direction: column; gap: 16px; overflow: hidden; background-color: var(--tk-bg); }
        .tk-date-badge { align-self: center; color: var(--tk-muted); font-size: 12px; margin-bottom: 10px; font-family: var(--font-en); }

        /* رسالة المستلم مع الصورة والقلب (اللايك) */
        .msg-row-received { display: flex; align-items: flex-end; gap: 8px; max-width: 85%; position: relative; }
        .tk-avatar-small { width: 32px; height: 32px; border-radius: 50%; background-color: #333; background-size: cover; background-position: center; flex-shrink: 0; }
        .msg-received-box { position: relative; }
        .msg-received { background: var(--tk-received); color: var(--tk-text); padding: 12px 16px; border-radius: 18px; border-bottom-left-radius: 4px; font-size: 15px; line-height: 1.4; }
        
        /* القلب الأحمر الصغير اللي يظهر من تدوس لايك للرسالة */
        .msg-like-badge { position: absolute; bottom: -8px; right: 10px; background: #000; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--primary-color); border: 2px solid var(--tk-bg); display: none; }

        /* رسالتك (لون سماوي) */
        .msg-row-sent { display: flex; flex-direction: column; align-items: flex-end; align-self: flex-end; max-width: 80%; }
        .msg-sent { background: var(--tk-sent); color: var(--tk-sent-text); padding: 12px 16px; border-radius: 18px; border-bottom-right-radius: 4px; font-size: 15px; line-height: 1.4; font-weight: 500;}
        .msg-seen { font-size: 12px; color: var(--tk-muted); margin-top: 5px; font-family: var(--font-en); display: none; }

        /* شريط الإدخال الحقيقي لتيك توك */
        .tk-input-area { padding: 10px 15px; background: var(--tk-bg); border-top: 1px solid #1a1a1a; display: flex; align-items: center; gap: 15px; }
        .tk-camera-icon { color: var(--tk-text); font-size: 22px; }
        
        .tk-input-box { flex: 1; background: #252525; border-radius: 20px; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
        .tk-placeholder { color: var(--tk-muted); font-size: 15px; font-family: var(--font-en); }
        .tk-input-box i { color: var(--tk-text); font-size: 18px; opacity: 0.8; }
        
        .tk-heart-btn { color: var(--primary-color); font-size: 24px; display: flex; align-items: center; justify-content: center; }

        .android-nav-bar { display: flex; justify-content: space-around; align-items: center; height: 44px; background: #000000; padding: 0 40px; }
        .nav-btn-recent { width: 14px; height: 14px; border: 2px solid #888; border-radius: 2px; }
        .nav-btn-home { width: 16px; height: 16px; border: 2px solid #888; border-radius: 50%; }
        .nav-btn-back { width: 0; height: 0; border-top: 7px solid transparent; border-bottom: 7px solid transparent; border-right: 11px solid #888; }
    </style>
</head>
<body>

    <div class="workspace">
        <div class="controls">
            <h2><i class="fa-brands fa-tiktok"></i> إعدادات سكرين شوت TikTok</h2>
            
            <div class="control-section">
                <div class="control-section-title">شريط الإشعارات (Status Bar)</div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div class="input-group">
                        <label>وقت الموبايل:</label>
                        <input type="text" id="inPhoneTime" value="10:50" oninput="updateLive()" dir="ltr">
                    </div>
                    <div class="input-group">
                        <label>البطارية:</label>
                        <select id="inBattery" onchange="updateLive()">
                            <option value="full">ممتلئ (100%)</option>
                            <option value="three-quarters">جيد (75%)</option>
                            <option value="half">نصف (50%)</option>
                            <option value="low">ضعيف (أحمر)</option>
                        </select>
                    </div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div class="input-group">
                        <label>الـ Wi-Fi:</label>
                        <select id="inWifi" onchange="updateLive()">
                            <option value="3">قوي جداً</option>
                            <option value="2">متوسط</option>
                            <option value="1">ضعيف</option>
                            <option value="0">مخفي</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>الشبكة (Signal):</label>
                        <select id="inSignal" onchange="updateLive()">
                            <option value="4">تغطية كاملة</option>
                            <option value="3">جيدة</option>
                            <option value="2">متوسطة</option>
                            <option value="1">ضعيفة</option>
                            <option value="0">لا توجد خدمة</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <div class="control-section-title">بيانات الحساب</div>
                <div class="file-upload-grid">
                    <label class="custom-file-upload">
                        <input type="file" accept="image/*" onchange="updateAvatar(event)" style="display:none;">
                        <i class="fas fa-user-circle"></i> رفع صورة الشخص
                    </label>
                </div>
                <div class="input-group">
                    <label>اسم المستخدم:</label>
                    <input type="text" id="inName" value="TikTokUser" oninput="updateLive()" dir="ltr">
                </div>
            </div>

            <div class="control-section">
                <div class="control-section-title">الرسائل والتفاصيل الدقيقة</div>
                <div class="input-group">
                    <label>وقت المحادثة:</label>
                    <input type="text" id="inDate" value="Today 12:42 PM" oninput="updateLive()" dir="ltr">
                </div>
                <div class="input-group">
                    <label>رسالة الطرف الآخر:</label>
                    <textarea id="inMsg1" oninput="updateLive()">هسه الواجهة صارت حقيقية 100%، شكراً لك!</textarea>
                    <div style="margin-top: 8px;">
                        <label>إعجاب بالرسالة (قلب التيك توك):</label>
                        <select id="inLike" onchange="updateLive()">
                            <option value="none">بدون إعجاب</option>
                            <option value="liked">إضافة قلب (Like)</option>
                        </select>
                    </div>
                </div>
                <div class="input-group">
                    <label>رسالتك أنت (السماوية):</label>
                    <textarea id="inMsg2" oninput="updateLive()">بالخدمة! تم إضافة الصورة بجانب الرسالة وشريط الإدخال الأصلي.</textarea>
                    <div style="margin-top: 8px;">
                        <label>حالة القراءة (Seen):</label>
                        <select id="inSeen" onchange="updateLive()">
                            <option value="none">مخفي</option>
                            <option value="seen">Seen (تم العرض)</option>
                        </select>
                    </div>
                </div>
            </div>

            <button class="btn-download" onclick="captureTikTok()"><i class="fas fa-camera"></i> حفظ الصورة (4K)</button>
        </div>

        <div class="capture-container" id="captureArea">
            <div class="phone-status-bar">
                <div class="status-icons">
                    <svg id="outSignal" viewBox="0 0 16 12" fill="#ffffff" width="16"><rect id="sig-1" x="0" y="8" width="2.5" height="4" rx="1"/><rect id="sig-2" x="4.5" y="5.5" width="2.5" height="6.5" rx="1"/><rect id="sig-3" x="9" y="2.5" width="2.5" height="9.5" rx="1"/><rect id="sig-4" x="13.5" y="0" width="2.5" height="12" rx="1"/></svg>
                    <svg id="outWifi" viewBox="0 0 18 13" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18"><path id="wifi-3" d="M1 3.5 Q9 -1.5 17 3.5" /><path id="wifi-2" d="M4.5 7 Q9 4 13.5 7" /><path id="wifi-1" d="M8 10.5 Q9 9.5 10 10.5" stroke-width="2.5"/></svg>
                    <svg id="outBattery" viewBox="0 0 24 12" fill="none" width="24"><rect x="1" y="1" width="20" height="10" rx="2" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/><path d="M23 4V8" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.6"/><rect id="bat-fill" x="3" y="3" width="16" height="6" rx="1" fill="#ffffff"/></svg>
                </div>
                <div id="outPhoneTime">10:50</div>
            </div>

            <div class="tk-header">
                <div class="tk-header-left">
                    <i class="fas fa-arrow-left tk-back"></i>
                    <div class="tk-user-title">
                        <span id="outName">TikTokUser</span>
                        <i class="fas fa-chevron-right" style="transform: rotate(90deg);"></i>
                    </div>
                </div>
                <div class="tk-header-icons">
                    <i class="fas fa-video"></i>
                    <i class="fas fa-info-circle"></i>
                </div>
            </div>

            <div class="tk-chat-area">
                <div class="tk-date-badge" id="outDate">Today 12:42 PM</div>
                
                <div class="msg-row-received">
                    <div class="tk-avatar-small outAvatarClass"></div>
                    <div class="msg-received-box">
                        <div class="msg-received" id="outMsg1">هسه الواجهة صارت حقيقية 100%، شكراً لك!</div>
                        <div class="msg-like-badge" id="outLike"><i class="fas fa-heart"></i></div>
                    </div>
                </div>
                
                <div class="msg-row-sent">
                    <div class="msg-sent" id="outMsg2">بالخدمة! تم إضافة الصورة بجانب الرسالة وشريط الإدخال الأصلي.</div>
                    <div class="msg-seen" id="outSeen">Seen</div>
                </div>
            </div>

            <div class="tk-input-area">
                <i class="fas fa-camera tk-camera-icon"></i>
                <div class="tk-input-box">
                    <span class="tk-placeholder">Send a message...</span>
                    <i class="far fa-smile"></i>
                </div>
                <div class="tk-heart-btn"><i class="fas fa-heart"></i></div>
            </div>

            <div class="android-nav-bar">
                <div class="nav-btn-recent"></div> <div class="nav-btn-home"></div> <div class="nav-btn-back"></div>
            </div>
        </div>
    </div>

    <script>
        function updateLive() {
            document.getElementById('outPhoneTime').innerText = document.getElementById('inPhoneTime').value;
            document.getElementById('outName').innerText = document.getElementById('inName').value || 'Username';
            document.getElementById('outDate').innerText = document.getElementById('inDate').value;
            document.getElementById('outMsg1').innerText = document.getElementById('inMsg1').value;
            document.getElementById('outMsg2').innerText = document.getElementById('inMsg2').value;

            // إعدادات الميزات الدقيقة
            const likeStatus = document.getElementById('inLike').value;
            document.getElementById('outLike').style.display = likeStatus === 'liked' ? 'flex' : 'none';

            const seenStatus = document.getElementById('inSeen').value;
            const seenEl = document.getElementById('outSeen');
            if(seenStatus === 'seen') {
                seenEl.style.display = 'block';
                seenEl.innerText = 'Seen';
            } else {
                seenEl.style.display = 'none';
            }

            // الماتريكس (البطارية، الشبكة، الواي فاي)
            const batteryStatus = document.getElementById('inBattery').value;
            const batFill = document.getElementById('bat-fill');
            if (batteryStatus === 'full') { batFill.setAttribute('width', '16'); batFill.setAttribute('fill', '#ffffff'); }
            else if (batteryStatus === 'three-quarters') { batFill.setAttribute('width', '12'); batFill.setAttribute('fill', '#ffffff'); }
            else if (batteryStatus === 'half') { batFill.setAttribute('width', '8'); batFill.setAttribute('fill', '#ffffff'); }
            else if (batteryStatus === 'low') { batFill.setAttribute('width', '3'); batFill.setAttribute('fill', '#ff3b30'); }

            const wifiLevel = parseInt(document.getElementById('inWifi').value);
            document.getElementById('outWifi').style.display = wifiLevel === 0 ? 'none' : 'block';
            document.getElementById('wifi-1').style.opacity = wifiLevel >= 1 ? '1' : '0.25';
            document.getElementById('wifi-2').style.opacity = wifiLevel >= 2 ? '1' : '0.25';
            document.getElementById('wifi-3').style.opacity = wifiLevel >= 3 ? '1' : '0.25';

            const sigLevel = parseInt(document.getElementById('inSignal').value);
            document.getElementById('outSignal').style.display = sigLevel === 0 ? 'none' : 'block';
            document.getElementById('sig-1').style.opacity = sigLevel >= 1 ? '1' : '0.25';
            document.getElementById('sig-2').style.opacity = sigLevel >= 2 ? '1' : '0.25';
            document.getElementById('sig-3').style.opacity = sigLevel >= 3 ? '1' : '0.25';
            document.getElementById('sig-4').style.opacity = sigLevel >= 4 ? '1' : '0.25';
        }

        function updateAvatar(event) {
            const reader = new FileReader();
            reader.onload = function() { 
                const avatars = document.querySelectorAll('.outAvatarClass');
                avatars.forEach(avatar => avatar.style.backgroundImage = `url(${reader.result})`);
            };
            if(event.target.files[0]) reader.readAsDataURL(event.target.files[0]);
        }

        function captureTikTok() {
            html2canvas(document.getElementById('captureArea'), { scale: 5, backgroundColor: '#000000', useCORS: true }).then(canvas => {
                const link = document.createElement('a');
                link.download = `TikTok_Screenshot_4K_${Date.now()}.png`;
                link.href = canvas.toDataURL("image/png", 1.0);
                link.click();
            });
        }
        window.onload = updateLive;
    </script>
</body>
</html>
