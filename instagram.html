<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منشور Instagram | سكرين شوت ديناميكي 4K</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-site: #0b0f19; 
            --panel-bg: #151b2b;
            --primary-color: #0095f6; /* لون إنستغرام الأزرق */
            
            --ig-bg: #000000; 
            --ig-text: #f5f5f5;
            --ig-muted: #a8a8a8;
            --ig-border: #262626;
            
            --font-ar: 'Tajawal', sans-serif;
            --font-en: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { background-color: var(--bg-site); color: #fff; font-family: var(--font-ar); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 30px 15px; -webkit-font-smoothing: antialiased;}

        .workspace { display: flex; flex-wrap: wrap; gap: 30px; width: 100%; max-width: 1050px; justify-content: center; align-items: flex-start; }

        /* ----- لوحة التحكم ----- */
        .controls { background: var(--panel-bg); border: 1px solid #1e293b; padding: 25px; border-radius: 12px; flex: 1; min-width: 360px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .controls h2 { font-size: 18px; margin-bottom: 20px; color: var(--primary-color); display: flex; align-items: center; gap: 10px; }
        
        .control-section { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; border: 1px solid #1e293b; margin-bottom: 20px; }
        .control-section-title { font-size: 14px; color: var(--primary-color); margin-bottom: 15px; font-weight: 700; border-bottom: 1px solid #1e293b; padding-bottom: 8px; }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 13px; color: #cbd5e1; }
        .input-group input, .input-group textarea, .input-group select { width: 100%; padding: 10px 12px; background: #0f172a; border: 1px solid #1e293b; color: #fff; border-radius: 6px; outline: none; font-size: 14px; font-family: var(--font-ar); }
        .input-group textarea { resize: vertical; min-height: 60px; }
        
        .file-upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .custom-file-upload { display: block; width: 100%; padding: 10px; background: #0f172a; border: 1px dashed var(--primary-color); color: var(--primary-color); border-radius: 6px; text-align: center; cursor: pointer; font-size: 13px; transition: 0.3s; }
        .custom-file-upload:hover { background: rgba(0, 149, 246, 0.1); }

        .toggle-container { display: flex; align-items: center; gap: 10px; cursor: pointer; margin-bottom: 15px; }
        .toggle-checkbox { display: none; }
        .toggle-btn { width: 44px; height: 24px; background: #334155; border-radius: 20px; position: relative; transition: 0.3s; }
        .toggle-btn::after { content: ''; position: absolute; top: 2px; right: 2px; width: 20px; height: 20px; background: #fff; border-radius: 50%; transition: 0.3s; }
        .toggle-checkbox:checked + .toggle-btn { background: var(--primary-color); }
        .toggle-checkbox:checked + .toggle-btn::after { transform: translateX(-20px); }
        
        /* زر التحميل بنفس هندسة الواتساب المعتمدة */
        .btn-download { width: 100%; background: #fff; color: #000; font-weight: bold; padding: 15px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-top: 10px; display: flex; justify-content: center; align-items: center; gap: 8px;}
        .btn-download:hover { opacity: 0.9; }
        .btn-download:disabled { opacity: 0.8; cursor: not-allowed; background: #475569; color: #fff; }

        /* أزرار الإضافة للتعليقات */
        .btn-add { width: 100%; padding: 12px; font-size: 14px; font-family: var(--font-ar); font-weight: bold; border-radius: 6px; cursor: pointer; border: none; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 5px; background: var(--primary-color); color: #fff; margin-bottom: 15px;}
        .btn-add:hover { opacity: 0.8; }

        /* قائمة التعليقات المضافة */
        .msg-list-item { background: #0f172a; border: 1px solid #1e293b; padding: 10px; border-radius: 6px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
        .msg-list-item .msg-text-preview { flex: 1; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #e2e8f0; }
        .msg-list-item .comment-user-badge { font-weight: bold; font-family: var(--font-en); font-size: 12px; color: var(--primary-color); }
        .action-btn { background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 14px; padding: 5px; transition: 0.2s; }
        .action-btn:hover { color: #fff; }
        .action-btn.delete:hover { color: #ef4444; }

        /* ----- منطقة التصوير (بدون Box-Shadow لتفادي التجميد) ----- */
        .capture-container { width: 380px; background-color: var(--ig-bg); border-radius: 0; overflow: hidden; position: relative; display: flex; flex-direction: column; border: 1px solid #334155; }

        .phone-status-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 18px 4px 18px; background: var(--ig-bg); font-family: var(--font-en); font-size: 13px; color: #ffffff; font-weight: 500; }
        .status-icons { display: flex; align-items: center; gap: 6px; color: #fff; }
        .status-icons i { font-size: 11px; }

        /* رأس المنشور */
        .ig-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--ig-bg); border-bottom: 1px solid var(--ig-border); }
        .ig-header-left { display: flex; align-items: center; gap: 10px; }
        .ig-avatar { width: 32px; height: 32px; border-radius: 50%; background-color: #333; background-size: cover; background-position: center; border: 1px solid #333; }
        .ig-user-info { display: flex; flex-direction: column; justify-content: center; }
        .ig-name-wrapper { display: flex; align-items: center; gap: 4px; }
        .ig-name { color: var(--ig-text); font-size: 14px; font-weight: 600; line-height: 1.2; font-family: var(--font-en); }
        .ig-verified { color: var(--primary-color); font-size: 12px; }
        .ig-location { color: var(--ig-text); font-size: 11px; line-height: 1.2; font-family: var(--font-ar); }
        .ig-more { color: var(--ig-text); font-size: 16px; }

        /* صورة المنشور */
        .ig-post-image { width: 100%; aspect-ratio: 4 / 5; background-color: #111; background-size: cover; background-position: center; }

        /* قسم التفاعل */
        .ig-engagement-area { padding: 12px 14px; background: var(--ig-bg); display: flex; flex-direction: column; gap: 8px; }
        .ig-action-bar { display: flex; justify-content: space-between; align-items: center; }
        .ig-action-left { display: flex; gap: 16px; font-size: 22px; color: var(--ig-text); }
        .ig-action-right { font-size: 22px; color: var(--ig-text); }
        .ig-action-icon { cursor: pointer; }

        .ig-likes { color: var(--ig-text); font-size: 14px; font-weight: 600; font-family: var(--font-ar); }
        
        .ig-caption-area { font-size: 14px; line-height: 1.4; color: var(--ig-text); }
        .ig-caption-user { font-weight: 600; font-family: var(--font-en); margin-left: 5px; }

        /* قسم التعليقات */
        .ig-comments-list { display: flex; flex-direction: column; gap: 6px; }
        .ig-comment-item { font-size: 14px; line-height: 1.4; color: var(--ig-text); }
        .ig-comment-user { font-weight: 600; font-family: var(--font-en); margin-left: 5px; }

        .ig-time { font-size: 11px; color: var(--ig-muted); font-family: var(--font-ar); margin-top: 4px; text-transform: uppercase; }

    </style>
</head>
<body>

    <div class="workspace">
        
        <div class="controls">
            <h2><i class="fa-brands fa-instagram"></i> لوحة تحكم Instagram</h2>
            
            <div class="control-section">
                <div class="control-section-title">شريط الإشعارات (Status Bar)</div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div class="input-group">
                        <label>وقت الموبايل:</label>
                        <input type="text" id="inPhoneTime" value="10:50" oninput="updateStaticUI()" dir="ltr">
                    </div>
                    <div class="input-group">
                        <label>البطارية:</label>
                        <select id="inBattery" onchange="updateStaticUI()">
                            <option value="full">ممتلئ (100%)</option>
                            <option value="three-quarters">جيد (75%)</option>
                            <option value="half">نصف (50%)</option>
                            <option value="low">ضعيف (أحمر)</option>
                        </select>
                    </div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div class="input-group">
                        <label>الـ Wi-Fi:</label>
                        <select id="inWifi" onchange="updateStaticUI()">
                            <option value="3">قوي</option>
                            <option value="0">مخفي</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>الشبكة (Signal):</label>
                        <select id="inSignal" onchange="updateStaticUI()">
                            <option value="4">تغطية كاملة</option>
                            <option value="0">لا توجد خدمة</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <div class="control-section-title">بيانات المنشور والصور</div>
                <div class="file-upload-grid">
                    <label class="custom-file-upload">
                        <input type="file" accept="image/*" onchange="updateAvatar(event)" style="display:none;">
                        <i class="fas fa-user-circle"></i> صورة الحساب
                    </label>
                    <label class="custom-file-upload">
                        <input type="file" accept="image/*" onchange="updatePostImg(event)" style="display:none;">
                        <i class="fas fa-image"></i> صورة المنشور
                    </label>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div class="input-group">
                        <label>المعرف (يوزرنيم):</label>
                        <input type="text" id="inUsername" value="realmadrid" oninput="updateStaticUI()" dir="ltr">
                    </div>
                    <div class="input-group">
                        <label>الموقع (اختياري):</label>
                        <input type="text" id="inLocation" value="Santiago Bernabéu" oninput="updateStaticUI()">
                    </div>
                </div>
                <label class="toggle-container">
                    <input type="checkbox" id="inVerified" class="toggle-checkbox" onchange="updateStaticUI()" checked>
                    <div class="toggle-btn"></div>
                    <span style="font-size: 14px; color: #cbd5e1; margin-right: 10px;">علامة التوثيق الزرقاء</span>
                </label>
            </div>

            <div class="control-section">
                <div class="control-section-title">التفاعل والوصف (Caption)</div>
                <div class="input-group">
                    <label>نص الإعجابات:</label>
                    <input type="text" id="inLikes" value="١,٢٣٤,٥٦٧ تسجيل إعجاب" oninput="updateStaticUI()">
                </div>
                <div class="input-group">
                    <label>وصف المنشور (الكبشن):</label>
                    <textarea id="inCaption" oninput="updateStaticUI()">هلا مدريد! الفوز اليوم كان استثنائي. 🤍🔥</textarea>
                </div>
                <div class="input-group">
                    <label>وقت النشر (بالأسفل):</label>
                    <input type="text" id="inPostTime" value="قبل ساعتين" oninput="updateStaticUI()">
                </div>
            </div>

            <div class="control-section">
                <div class="control-section-title">إضافة تعليقات (اختياري)</div>
                <div style="display:grid; grid-template-columns: 1fr 2fr; gap:10px; margin-bottom: 10px;">
                    <div class="input-group" style="margin-bottom: 0;">
                        <input type="text" id="newCommentUser" placeholder="اليوزرنيم" dir="ltr">
                    </div>
                    <div class="input-group" style="margin-bottom: 0;">
                        <input type="text" id="newCommentText" placeholder="نص التعليق...">
                    </div>
                </div>
                <button class="btn-add" onclick="addComment()"><i class="fas fa-plus"></i> إضافة التعليق</button>
                
                <div class="control-section-title" style="margin-top: 15px; border-bottom: none; font-size: 13px; color: var(--text-muted);">
                    <i class="fas fa-list"></i> ترتيب التعليقات
                </div>
                <div id="comments-list"></div>
            </div>

            <button class="btn-download" id="btnDownload" onclick="captureInstagram()"><i class="fas fa-camera"></i> حفظ الصورة بدقة 4K</button>
        </div>

        <div class="capture-container" id="captureArea">
            
            <div class="phone-status-bar">
                <div class="status-icons">
                    <i id="outSignal" class="fas fa-signal"></i>
                    <i id="outWifi" class="fas fa-wifi"></i>
                    <i id="outBattery" class="fas fa-battery-three-quarters" style="font-size: 13px;"></i>
                </div>
                <div id="outPhoneTime">10:50</div>
            </div>

            <div class="ig-header">
                <div class="ig-header-left">
                    <div class="ig-avatar" id="outAvatar"></div>
                    <div class="ig-user-info">
                        <div class="ig-name-wrapper">
                            <span class="ig-name" id="outUsername">realmadrid</span>
                            <i class="fas fa-check-circle ig-verified" id="outVerified"></i>
                        </div>
                        <div class="ig-location" id="outLocation">Santiago Bernabéu</div>
                    </div>
                </div>
                <div class="ig-more"><i class="fas fa-ellipsis-h"></i></div>
            </div>

            <div class="ig-post-image" id="outPostImage"></div>

            <div class="ig-engagement-area">
                <div class="ig-action-bar">
                    <div class="ig-action-left">
                        <i class="far fa-heart ig-action-icon"></i>
                        <i class="far fa-comment ig-action-icon" style="transform: scaleX(-1);"></i>
                        <i class="far fa-paper-plane ig-action-icon"></i>
                    </div>
                    <div class="ig-action-right">
                        <i class="far fa-bookmark ig-action-icon"></i>
                    </div>
                </div>

                <div class="ig-likes" id="outLikes">١,٢٣٤,٥٦٧ تسجيل إعجاب</div>

                <div class="ig-caption-area">
                    <span class="ig-caption-user" id="outCaptionUser">realmadrid</span>
                    <span id="outCaption">هلا مدريد! الفوز اليوم كان استثنائي. 🤍🔥</span>
                </div>

                <div class="ig-comments-list" id="outCommentsArea"></div>

                <div class="ig-time" id="outPostTime">قبل ساعتين</div>
            </div>

        </div>
    </div>

    <script>
        function updateStaticUI() {
            // شريط الإشعارات
            document.getElementById('outPhoneTime').innerText = document.getElementById('inPhoneTime').value;
            
            const batteryStatus = document.getElementById('inBattery').value;
            const batIcon = document.getElementById('outBattery');
            if (batteryStatus === 'full') { batIcon.className = 'fas fa-battery-full'; batIcon.style.color = '#fff'; }
            else if (batteryStatus === 'three-quarters') { batIcon.className = 'fas fa-battery-three-quarters'; batIcon.style.color = '#fff'; }
            else if (batteryStatus === 'half') { batIcon.className = 'fas fa-battery-half'; batIcon.style.color = '#fff'; }
            else if (batteryStatus === 'low') { batIcon.className = 'fas fa-battery-quarter'; batIcon.style.color = '#ff3b30'; }

            document.getElementById('outWifi').style.display = document.getElementById('inWifi').value === '0' ? 'none' : 'inline-block';
            document.getElementById('outSignal').style.display = document.getElementById('inSignal').value === '0' ? 'none' : 'inline-block';

            // بيانات المنشور
            const username = document.getElementById('inUsername').value || 'username';
            document.getElementById('outUsername').innerText = username;
            document.getElementById('outCaptionUser').innerText = username;
            
            const locationVal = document.getElementById('inLocation').value;
            document.getElementById('outLocation').innerText = locationVal;
            document.getElementById('outLocation').style.display = locationVal ? 'block' : 'none';

            document.getElementById('outVerified').style.display = document.getElementById('inVerified').checked ? 'inline-block' : 'none';
            document.getElementById('outLikes').innerText = document.getElementById('inLikes').value;
            document.getElementById('outCaption').innerText = document.getElementById('inCaption').value;
            document.getElementById('outPostTime').innerText = document.getElementById('inPostTime').value;
        }

        // نظام التعليقات المركزي
        let comments = [];

        function addComment() {
            const userInp = document.getElementById('newCommentUser');
            const textInp = document.getElementById('newCommentText');
            
            const user = userInp.value.trim();
            const text = textInp.value.trim();
            if(!user || !text) return; 

            comments.push({ id: Date.now(), user: user, text: text });
            
            userInp.value = "";
            textInp.value = "";
            renderComments();
        }

        function deleteComment(id) {
            comments = comments.filter(c => c.id !== id);
            renderComments();
        }

        function moveCommentUp(index) {
            if (index > 0) {
                [comments[index], comments[index - 1]] = [comments[index - 1], comments[index]];
                renderComments();
            }
        }

        function moveCommentDown(index) {
            if (index < comments.length - 1) {
                [comments[index], comments[index + 1]] = [comments[index + 1], comments[index]];
                renderComments();
            }
        }

        function renderComments() {
            const listArea = document.getElementById('comments-list');
            const outCommentsArea = document.getElementById('outCommentsArea');
            
            listArea.innerHTML = "";
            outCommentsArea.innerHTML = "";

            comments.forEach((c, index) => {
                // عرض التعليق في لوحة التحكم
                listArea.innerHTML += `
                    <div class="msg-list-item">
                        <span class="comment-user-badge">${c.user}</span>
                        <span class="msg-text-preview">${c.text}</span>
                        <div style="display:flex; gap:2px;">
                            <button class="action-btn" onclick="moveCommentUp(${index})"><i class="fas fa-chevron-up"></i></button>
                            <button class="action-btn" onclick="moveCommentDown(${index})"><i class="fas fa-chevron-down"></i></button>
                            <button class="action-btn delete" onclick="deleteComment(${c.id})"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;

                // عرض التعليق في السكرين شوت
                outCommentsArea.innerHTML += `
                    <div class="ig-comment-item">
                        <span class="ig-comment-user">${c.user}</span>
                        <span>${c.text}</span>
                    </div>
                `;
            });
        }

        function updateAvatar(event) {
            const reader = new FileReader();
            reader.onload = function() { document.getElementById('outAvatar').style.backgroundImage = `url(${reader.result})`; };
            if(event.target.files[0]) reader.readAsDataURL(event.target.files[0]);
        }

        function updatePostImg(event) {
            const reader = new FileReader();
            reader.onload = function() { document.getElementById('outPostImage').style.backgroundImage = `url(${reader.result})`; };
            if(event.target.files[0]) reader.readAsDataURL(event.target.files[0]);
        }

        // دالة التحميل مع الـ Workaround الناجح
        function captureInstagram() {
            const btn = document.getElementById('btnDownload');
            if (btn.disabled) return;


 // 🚀 فتح الإعلان المباشر فور الضغط
            window.open('https://www.effectivecpmnetwork.com/eekt4f7tz?key=65261256f343b49baa62f9a3fd6f401a');


            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري المعالجة...';
            btn.disabled = true;

            const captureArea = document.getElementById('captureArea');

            setTimeout(() => {
                html2canvas(captureArea, { 
                    scale: 5, 
                    backgroundColor: '#000000', 
                    useCORS: true 
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `Insta_Post_4K_${Date.now()}.png`;
                    link.href = canvas.toDataURL("image/png");
                    link.click();

                    btn.innerHTML = '<div style="display: flex; flex-direction: column; gap: 4px; text-align: center;"><span style="color: #10b981; font-size: 16px;"><i class="fas fa-check-circle"></i> تم تحميل الصورة بنجاح</span><span style="color: #e2e8f0; font-size: 13px; font-weight: normal;">يرجى تحديث الصفحة للتحميل مجدداً <i class="fas fa-sync-alt"></i></span></div>';

                    
                    setTimeout(() => {
                        alert("✅ تم تحميل الصورة بنجاح!\n\n⚠️ بسبب الدقة الفائقة (4K)، يرجى تحديث الصفحة (Refresh) للتمكن من تصميم وتحميل صورة أخرى.");
                    }, 500);

                }).catch(err => {
                    console.error(err);
                    btn.innerHTML = '<i class="fas fa-sync-alt"></i> يرجى تحديث الصفحة';
                    alert("❌ حدث خطأ. يرجى تحديث الصفحة والمحاولة مجدداً.");
                });
            }, 150);
        }
        
        window.onload = () => {
            updateStaticUI();
            
            // إضافة تعليق افتراضي كتجربة
            document.getElementById('newCommentUser').value = "cristiano";
            document.getElementById('newCommentText').value = "Hala Madrid! 👑";
            addComment();
        };
    </script>
</body>
</html>
