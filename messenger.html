<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محادثة Messenger | سكرين شوت خام 4K</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* ألوان بيئة العمل */
            --bg-site: #0b0f19; 
            --panel-bg: #151b2b;
            --primary-color: #0084ff; /* أزرق ماسنجر للوحة التحكم */
            
            /* ألوان ماسنجر الرسمية (Dark Mode) */
            --ms-bg: #000000; 
            --ms-header: #000000;
            --ms-received: #303030;
            --ms-sent: #0084ff;
            --ms-text: #e4e6eb;
            --ms-muted: #b0b3b8;
            --ms-active-dot: #31a24c; /* أخضر ماسنجر */
            
            --font-ar: 'Tajawal', sans-serif;
            --font-en: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-site);
            color: #fff;
            font-family: var(--font-ar);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 15px;
            -webkit-font-smoothing: antialiased;
        }

        .workspace {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            width: 100%;
            max-width: 1050px;
            justify-content: center;
            align-items: flex-start;
        }

        /* ----- لوحة التحكم ----- */
        .controls {
            background: var(--panel-bg);
            border: 1px solid #1e293b;
            padding: 25px;
            border-radius: 12px;
            flex: 1;
            min-width: 340px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .controls h2 { font-size: 18px; margin-bottom: 20px; color: var(--primary-color); display: flex; align-items: center; gap: 10px; }
        
        .control-section {
            background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px;
            border: 1px solid #1e293b; margin-bottom: 20px;
        }
        .control-section-title {
            font-size: 14px; color: var(--primary-color); margin-bottom: 15px;
            font-weight: 700; border-bottom: 1px solid #1e293b; padding-bottom: 8px;
        }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 13px; color: #cbd5e1; }
        .input-group input, .input-group textarea, .input-group select {
            width: 100%; padding: 10px 12px; background: #0f172a; border: 1px solid #1e293b;
            color: #fff; border-radius: 6px; outline: none; font-size: 14px; font-family: var(--font-ar);
        }
        .input-group textarea { resize: vertical; min-height: 60px; }
        
        .file-upload-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 15px; }
        .custom-file-upload {
            display: block; width: 100%; padding: 10px; background: #0f172a;
            border: 1px dashed var(--primary-color); color: var(--primary-color);
            border-radius: 6px; text-align: center; cursor: pointer; font-size: 13px;
            transition: 0.3s;
        }
        .custom-file-upload:hover { background: rgba(0, 132, 255, 0.1); }
        .btn-download {
            width: 100%; background: var(--primary-color); color: #fff; font-weight: bold;
            padding: 15px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer;
            transition: 0.3s;
        }
        .btn-download:hover { opacity: 0.9; }

        /* ----- السكرين شوت الخام ----- */
        .capture-container {
            width: 380px;
            aspect-ratio: 9 / 19; 
            background-color: var(--ms-bg);
            border-radius: 0; 
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* شريط الإشعارات (الماتريكس الثابت) */
        .phone-status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 18px 4px 18px;
            background: var(--ms-header);
            font-family: var(--font-en);
            font-size: 13px;
            color: #ffffff;
            font-weight: 500;
            z-index: 20;
        }
        .status-icons { display: flex; align-items: center; gap: 6px; height: 14px; }
        .status-icons svg { display: block; height: 100%; }

        /* هيدر ماسنجر */
        .ms-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 15px 12px 15px;
            background: var(--ms-header);
        }
        .ms-header-left { display: flex; align-items: center; gap: 12px; }
        .ms-back { color: var(--ms-text); font-size: 20px; display: flex; align-items: center; cursor: pointer; }
        
        .ms-avatar-container {
            position: relative;
            width: 36px; height: 36px;
        }
        .ms-avatar {
            width: 100%; height: 100%; border-radius: 50%;
            background-color: #333; background-size: cover; background-position: center;
        }
        /* النقطة الخضراء (متصل الآن) */
        .ms-active-dot {
            position: absolute;
            bottom: 0; right: 0;
            width: 10px; height: 10px;
            background-color: var(--ms-active-dot);
            border: 2px solid var(--ms-bg);
            border-radius: 50%;
        }

        .ms-user-info { display: flex; flex-direction: column; justify-content: center; gap: 2px; }
        .ms-name { color: var(--ms-text); font-size: 16px; font-weight: 600; line-height: 1; font-family: var(--font-en); }
        .ms-status { color: var(--ms-muted); font-size: 12px; line-height: 1; font-family: var(--font-en); }
        
        .ms-header-icons { display: flex; gap: 22px; color: var(--ms-text); font-size: 20px; }

        /* منطقة المحادثة */
        .ms-chat-area {
            flex: 1;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow: hidden;
            background-color: var(--ms-bg); 
        }

        .ms-timestamp {
            align-self: center;
            color: var(--ms-muted);
            font-size: 12px;
            margin-bottom: 10px;
            font-family: var(--font-en);
            font-weight: 500;
        }

        /* رسالة الطرف الآخر */
        .msg-row-received {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            max-width: 85%;
        }
        .msg-avatar-small {
            width: 28px; height: 28px; border-radius: 50%;
            background-color: #333; background-size: cover; background-position: center;
            flex-shrink: 0;
        }
        .msg-received {
            background: var(--ms-received);
            color: var(--ms-text);
            padding: 10px 14px;
            border-radius: 18px 18px 18px 4px; /* زاوية ماسنجر المميزة للاستلام */
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        /* رسالتك */
        .msg-row-sent {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            align-self: flex-end;
            max-width: 80%;
        }
        .msg-sent {
            background: var(--ms-sent);
            color: #ffffff;
            padding: 10px 14px;
            border-radius: 18px 18px 4px 18px; /* زاوية ماسنجر المميزة للإرسال */
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        
        /* علامة الرؤية بالماسنجر (صورة مصغرة) */
        .ms-seen-avatar {
            width: 14px; height: 14px; border-radius: 50%;
            background-color: #333; background-size: cover; background-position: center;
            margin-top: 4px;
            margin-right: 2px;
        }

        /* شريط الإدخال في الماسنجر */
        .ms-input-area {
            padding: 10px 15px;
            background: var(--ms-bg);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .ms-input-icons {
            display: flex;
            gap: 14px;
            color: var(--ms-sent);
            font-size: 20px;
        }
        .ms-input-box {
            flex: 1; background: var(--ms-received); border-radius: 20px;
            padding: 8px 15px; display: flex; align-items: center; gap: 10px;
            justify-content: space-between;
        }
        .ms-placeholder { color: var(--ms-muted); font-size: 15px; }
        .ms-input-box i { color: var(--ms-sent); font-size: 18px; }
        
        .ms-like-btn { color: var(--ms-sent); font-size: 22px; }

        /* أزرار النظام السفلية */
        .android-nav-bar {
            display: flex; justify-content: space-around; align-items: center;
            height: 44px; background: #000000; padding: 0 40px;
        }
        .nav-btn-recent { width: 14px; height: 14px; border: 2px solid #888; border-radius: 2px; }
        .nav-btn-home { width: 16px; height: 16px; border: 2px solid #888; border-radius: 50%; }
        .nav-btn-back { width: 0; height: 0; border-top: 7px solid transparent; border-bottom: 7px solid transparent; border-right: 11px solid #888; }

    </style>
</head>
<body>

    <div class="workspace">
        
        <div class="controls">
            <h2><i class="fa-brands fa-facebook-messenger"></i> إعدادات سكرين شوت Messenger</h2>
            
            <!-- شريط الإشعارات (الماتريكس) -->
            <div class="control-section">
                <div class="control-section-title">شريط الإشعارات (Status Bar)</div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div class="input-group">
                        <label>وقت الموبايل:</label>
                        <input type="text" id="inPhoneTime" value="10:50" oninput="updateLive()" dir="ltr">
                    </div>
                    <div class="input-group">
                        <label>البطارية:</label>
                        <select id="inBattery" onchange="updateLive()">
                            <option value="full">ممتلئ (100%)</option>
                            <option value="three-quarters">جيد (75%)</option>
                            <option value="half">نصف (50%)</option>
                            <option value="low">ضعيف (أحمر)</option>
                        </select>
                    </div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div class="input-group">
                        <label>الـ Wi-Fi:</label>
                        <select id="inWifi" onchange="updateLive()">
                            <option value="3">قوي جداً</option>
                            <option value="2">متوسط</option>
                            <option value="1">ضعيف</option>
                            <option value="0">مخفي</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>الشبكة (Signal):</label>
                        <select id="inSignal" onchange="updateLive()">
                            <option value="4">تغطية كاملة</option>
                            <option value="3">جيدة</option>
                            <option value="2">متوسطة</option>
                            <option value="1">ضعيفة</option>
                            <option value="0">لا توجد خدمة</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- إعدادات المحادثة -->
            <div class="control-section">
                <div class="control-section-title">بيانات الحساب</div>
                <div class="file-upload-grid">
                    <label class="custom-file-upload">
                        <input type="file" accept="image/*" onchange="updateAvatar(event)" style="display:none;">
                        <i class="fas fa-user-circle"></i> رفع صورة الشخص
                    </label>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div class="input-group">
                        <label>اسم الشخص:</label>
                        <input type="text" id="inName" value="Yousef" oninput="updateLive()">
                    </div>
                    <div class="input-group">
                        <label>حالة الاتصال:</label>
                        <select id="inStatusType" onchange="updateLive()">
                            <option value="online">متصل (أخضر + Active now)</option>
                            <option value="offline">غير متصل (نص مخصص)</option>
                        </select>
                    </div>
                </div>
                <div class="input-group" id="offlineStatusDiv" style="display:none;">
                    <label>النص (مثال: Active 1h ago):</label>
                    <input type="text" id="inStatusText" value="Active 1h ago" oninput="updateLive()" dir="ltr">
                </div>
            </div>

            <!-- الرسائل -->
            <div class="control-section">
                <div class="control-section-title">الرسائل</div>
                <div class="input-group">
                    <label>وقت المحادثة (في المنتصف):</label>
                    <input type="text" id="inDate" value="OCT 24 AT 9:41 AM" oninput="updateLive()" dir="ltr">
                </div>

                <div class="input-group">
                    <label>رسالة الطرف الآخر:</label>
                    <textarea id="inMsg1" oninput="updateLive()">السلام عليكم، هل واجهة الماسنجر جاهزة؟</textarea>
                </div>

                <div class="input-group">
                    <label>رسالتك أنت:</label>
                    <textarea id="inMsg2" oninput="updateLive()">وعليكم السلام، نعم واجهة الماسنجر تمت برمجتها وتتضمن أيقونات الاتصال وشريط الموبايل المطابق 100%.</textarea>
                    <div style="margin-top: 8px;">
                        <label>هل شاهد الرسالة؟ (تظهر صورته المصغرة)</label>
                        <select id="inSeen" onchange="updateLive()">
                            <option value="seen">نعم (تمت المشاهدة)</option>
                            <option value="unseen">لا (بدون صورة)</option>
                        </select>
                    </div>
                </div>
            </div>

            <button class="btn-download" onclick="captureMessenger()"><i class="fas fa-camera"></i> حفظ الصورة بدقة 4K</button>
        </div>

        <!-- السكرين شوت الخام -->
        <div class="capture-container" id="captureArea">
            
            <div class="phone-status-bar">
                <div class="status-icons">
                    <svg id="outSignal" viewBox="0 0 16 12" fill="#ffffff" width="16">
                        <rect id="sig-1" x="0" y="8" width="2.5" height="4" rx="1"/>
                        <rect id="sig-2" x="4.5" y="5.5" width="2.5" height="6.5" rx="1"/>
                        <rect id="sig-3" x="9" y="2.5" width="2.5" height="9.5" rx="1"/>
                        <rect id="sig-4" x="13.5" y="0" width="2.5" height="12" rx="1"/>
                    </svg>
                    <svg id="outWifi" viewBox="0 0 18 13" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18">
                        <path id="wifi-3" d="M1 3.5 Q9 -1.5 17 3.5" />
                        <path id="wifi-2" d="M4.5 7 Q9 4 13.5 7" />
                        <path id="wifi-1" d="M8 10.5 Q9 9.5 10 10.5" stroke-width="2.5"/>
                    </svg>
                    <svg id="outBattery" viewBox="0 0 24 12" fill="none" width="24">
                        <rect x="1" y="1" width="20" height="10" rx="2" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
                        <path d="M23 4V8" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
                        <rect id="bat-fill" x="3" y="3" width="16" height="6" rx="1" fill="#ffffff"/>
                    </svg>
                </div>
                <div id="outPhoneTime">10:50</div>
            </div>

            <!-- هيدر ماسنجر -->
            <div class="ms-header">
                <div class="ms-header-left">
                    <div class="ms-back"><i class="fas fa-arrow-left"></i></div> <!-- سهم الماسنجر بالعكس -->
                    <div class="ms-avatar-container">
                        <div class="ms-avatar outAvatarClass"></div>
                        <div class="ms-active-dot" id="outActiveDot"></div>
                    </div>
                    <div class="ms-user-info">
                        <span class="ms-name" id="outName">Yousef</span>
                        <span class="ms-status" id="outStatus">Active now</span>
                    </div>
                </div>
                <div class="ms-header-icons">
                    <i class="fas fa-phone-alt"></i>
                    <i class="fas fa-video"></i>
                    <i class="fas fa-info-circle"></i>
                </div>
            </div>

            <!-- منطقة المحادثة -->
            <div class="ms-chat-area">
                <div class="ms-timestamp" id="outDate">OCT 24 AT 9:41 AM</div>
                
                <div class="msg-row-received">
                    <div class="msg-avatar-small outAvatarClass"></div>
                    <div class="msg-received" id="outMsg1">السلام عليكم، هل واجهة الماسنجر جاهزة؟</div>
                </div>
                
                <div class="msg-row-sent">
                    <div class="msg-sent" id="outMsg2">وعليكم السلام، نعم واجهة الماسنجر تمت برمجتها وتتضمن أيقونات الاتصال وشريط الموبايل المطابق 100%.</div>
                    <!-- صورة الرؤية (Seen) أسفل رسالتك -->
                    <div class="ms-seen-avatar outAvatarClass" id="outSeen"></div>
                </div>
            </div>

            <!-- شريط الإدخال -->
            <div class="ms-input-area">
                <div class="ms-input-icons">
                    <i class="fas fa-plus-circle"></i>
                    <i class="fas fa-camera"></i>
                    <i class="far fa-image"></i>
                    <i class="fas fa-microphone"></i>
                </div>
                <div class="ms-input-box">
                    <span class="ms-placeholder">Message</span>
                    <i class="far fa-smile"></i>
                </div>
                <i class="fas fa-thumbs-up ms-like-btn"></i>
            </div>

            <div class="android-nav-bar">
                <div class="nav-btn-recent"></div> 
                <div class="nav-btn-home"></div>   
                <div class="nav-btn-back"></div>   
            </div>

        </div>
    </div>

    <script>
        function updateLive() {
            // شريط النظام
            document.getElementById('outPhoneTime').innerText = document.getElementById('inPhoneTime').value;
            
            // بيانات الحساب
            document.getElementById('outName').innerText = document.getElementById('inName').value || 'Name';
            
            const statusType = document.getElementById('inStatusType').value;
            const activeDot = document.getElementById('outActiveDot');
            const statusText = document.getElementById('outStatus');
            const offlineDiv = document.getElementById('offlineStatusDiv');

            if (statusType === 'online') {
                activeDot.style.display = 'block';
                statusText.innerText = 'Active now';
                offlineDiv.style.display = 'none';
            } else {
                activeDot.style.display = 'none';
                statusText.innerText = document.getElementById('inStatusText').value;
                offlineDiv.style.display = 'block';
            }

            // الرسائل
            document.getElementById('outDate').innerText = document.getElementById('inDate').value;
            document.getElementById('outMsg1').innerText = document.getElementById('inMsg1').value;
            document.getElementById('outMsg2').innerText = document.getElementById('inMsg2').value;
            
            // حالة الرؤية
            const isSeen = document.getElementById('inSeen').value;
            document.getElementById('outSeen').style.display = isSeen === 'seen' ? 'block' : 'none';

            // الماتريكس (الشبكة والواي فاي والبطارية)
            const wifiLevel = parseInt(document.getElementById('inWifi').value);
            document.getElementById('outWifi').style.display = wifiLevel === 0 ? 'none' : 'block';
            document.getElementById('wifi-1').style.opacity = wifiLevel >= 1 ? '1' : '0.25';
            document.getElementById('wifi-2').style.opacity = wifiLevel >= 2 ? '1' : '0.25';
            document.getElementById('wifi-3').style.opacity = wifiLevel >= 3 ? '1' : '0.25';

            const sigLevel = parseInt(document.getElementById('inSignal').value);
            document.getElementById('outSignal').style.display = sigLevel === 0 ? 'none' : 'block';
            document.getElementById('sig-1').style.opacity = sigLevel >= 1 ? '1' : '0.25';
            document.getElementById('sig-2').style.opacity = sigLevel >= 2 ? '1' : '0.25';
            document.getElementById('sig-3').style.opacity = sigLevel >= 3 ? '1' : '0.25';
            document.getElementById('sig-4').style.opacity = sigLevel >= 4 ? '1' : '0.25';

            const batteryStatus = document.getElementById('inBattery').value;
            const batFill = document.getElementById('bat-fill');
            if (batteryStatus === 'full') {
                batFill.setAttribute('width', '16'); batFill.setAttribute('fill', '#ffffff');
            } else if (batteryStatus === 'three-quarters') {
                batFill.setAttribute('width', '12'); batFill.setAttribute('fill', '#ffffff');
            } else if (batteryStatus === 'half') {
                batFill.setAttribute('width', '8'); batFill.setAttribute('fill', '#ffffff');
            } else if (batteryStatus === 'low') {
                batFill.setAttribute('width', '3'); batFill.setAttribute('fill', '#ff3b30'); 
            }
        }

        function updateAvatar(event) {
            const reader = new FileReader();
            reader.onload = function() { 
                // تغيير الصورة بـ 3 أماكن (الهيدر، فقاعة المستلم، فقاعة الـ Seen)
                const avatars = document.querySelectorAll('.outAvatarClass');
                avatars.forEach(avatar => {
                    avatar.style.backgroundImage = `url(${reader.result})`;
                });
            };
            if(event.target.files[0]) reader.readAsDataURL(event.target.files[0]);
        }

        function captureMessenger() {
            const captureArea = document.getElementById('captureArea');
            html2canvas(captureArea, { 
                scale: 5, 
                backgroundColor: '#000000', 
                useCORS: true 
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Messenger_Mockup_4K_${Date.now()}.png`;
                link.href = canvas.toDataURL("image/png", 1.0);
                link.click();
            });
        }
        
        window.onload = updateLive;
    </script>
</body>
</html>
